# render.yaml — Render.com deployment config
# Docs: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: whatsapp-chatbot
    env: node
    region: oregon          # or frankfurt / singapore
    plan: free              # upgrade to starter ($7/mo) to avoid spin-down
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_TOKEN
        sync: false         # set manually in Render dashboard
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: GOOGLE_VISION_KEY
        sync: false
