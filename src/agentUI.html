<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=360px, initial-scale=1, maximum-scale=1"/>
<title>PM SVANidhi — Agent Dashboard</title>
<style>
:root {
  --green:     #1a6e3c;
  --green-mid: #2d9e5f;
  --green-lt:  #e8f5ee;
  --green-pale:#f4fbf7;
  --amber:     #f59e0b;
  --amber-lt:  #fef9ec;
  --red:       #dc2626;
  --red-lt:    #fef2f2;
  --blue:      #2563eb;
  --blue-lt:   #eff6ff;
  --gray:      #6b7280;
  --gray-lt:   #f9fafb;
  --border:    #e5e7eb;
  --text:      #111827;
  --text-2:    #6b7280;
  --white:     #ffffff;
  --radius:    10px;
  --shadow:    0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#f0f2f0;
  color:var(--text);
  font-size:14px;
  width:360px;
  min-height:800px;
  margin:0 auto;
  position:relative;
  overflow-x:hidden;
}
/* ── Login ────────────────────────────────────────────────────── */
#loginScreen{
  min-height:800px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg,#0f4025 0%,#1a6e3c 60%,#2d9e5f 100%);
}
.login-logo{font-size:32px;margin-bottom:8px}
.login-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:36px}
.login-card{
  background:#fff;border-radius:16px;padding:24px;width:100%;
  box-shadow:0 8px 32px rgba(0,0,0,.18)
}
.login-card label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.login-card input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);
  border-radius:8px;font-size:15px;outline:none;margin-bottom:16px;
  transition:border .2s
}
.login-card input:focus{border-color:var(--green-mid)}
.btn-primary{
  width:100%;padding:14px;background:var(--green);color:#fff;
  border:none;border-radius:8px;font-size:15px;font-weight:600;
  cursor:pointer;transition:background .15s
}
.btn-primary:active{background:#0f4025}

/* ── App shell ────────────────────────────────────────────────── */
#appShell{display:none;flex-direction:column;min-height:800px}

/* ── Top bar ─────────────────────────────────────────────────── */
.topbar{
  background:var(--green);color:#fff;padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100
}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{font-size:20px}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:11px;opacity:.75}
.topbar-agent{
  background:rgba(255,255,255,.2);border-radius:20px;
  padding:4px 10px;font-size:12px;font-weight:500
}

/* ── Phase tabs ──────────────────────────────────────────────── */
.phase-tabs{
  display:flex;background:#fff;border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;padding:0 8px
}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-tab{
  flex-shrink:0;padding:10px 12px;font-size:11px;font-weight:600;
  color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .15s
}
.phase-tab.active{color:var(--green);border-bottom-color:var(--green)}
.phase-tab.done{color:var(--green-mid)}
.phase-tab .dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--border);margin-right:4px;vertical-align:middle
}
.phase-tab.done .dot{background:var(--green-mid)}
.phase-tab.active .dot{background:var(--green)}

/* ── Vendor strip ────────────────────────────────────────────── */
.vendor-strip{
  background:#fff;padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border)
}
.vendor-num{font-size:13px;font-weight:600}
.vendor-state{
  font-size:11px;padding:3px 8px;border-radius:12px;font-weight:500
}
.state-idle{background:var(--gray-lt);color:var(--gray)}
.state-active{background:var(--green-lt);color:var(--green)}
.state-waiting{background:var(--amber-lt);color:#b45309}
.state-done{background:var(--green-lt);color:var(--green)}

/* ── Scroll area ─────────────────────────────────────────────── */
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}

/* ── Cards ───────────────────────────────────────────────────── */
.card{
  background:#fff;border-radius:var(--radius);padding:14px;
  box-shadow:var(--shadow);border:1px solid var(--border)
}
.card-title{font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.card-green{background:var(--green-pale);border-color:#c3e6d4}
.card-amber{background:var(--amber-lt);border-color:#fde68a}
.card-red{background:var(--red-lt);border-color:#fca5a5}

/* ── Form elements ───────────────────────────────────────────── */
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.field input,.field select,.field textarea{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);
  border-radius:7px;font-size:13px;outline:none;background:#fff;
  color:var(--text);transition:border .2s
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green-mid)}
.field textarea{resize:none;height:64px}

/* ── Buttons ─────────────────────────────────────────────────── */
.btn{
  padding:9px 14px;border-radius:7px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;display:inline-flex;
  align-items:center;gap:6px
}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#0f4025}
.btn-green-outline{background:transparent;border:1.5px solid var(--green);color:var(--green)}
.btn-amber{background:var(--amber);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-gray{background:var(--gray-lt);color:var(--text);border:1px solid var(--border)}
.btn-full{width:100%;justify-content:center;padding:12px}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1;justify-content:center}

/* ── OTP box ─────────────────────────────────────────────────── */
.otp-row{display:flex;gap:8px;margin-bottom:8px}
.otp-row input{
  flex:1;text-align:center;font-size:20px;font-weight:700;
  padding:10px 0;border:2px solid var(--border);border-radius:8px;
  letter-spacing:2px
}
.otp-row input:focus{border-color:var(--green)}

/* ── Data rows ───────────────────────────────────────────────── */
.data-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--border);font-size:13px
}
.data-row:last-child{border-bottom:none}
.data-key{color:var(--text-2);font-size:12px}
.data-val{font-weight:500;color:var(--text)}
.data-val.redacted{color:var(--gray);font-family:monospace;font-size:12px;letter-spacing:1px}

/* ── OCR preview ─────────────────────────────────────────────── */
.ocr-img{
  width:100%;height:120px;object-fit:cover;border-radius:7px;
  border:1px solid var(--border);margin-bottom:10px;background:var(--gray-lt);
  display:flex;align-items:center;justify-content:center;color:var(--text-2);
  font-size:12px
}
.ocr-field{
  display:flex;gap:6px;align-items:center;margin-bottom:6px
}
.ocr-field label{font-size:11px;color:var(--text-2);white-space:nowrap;min-width:80px}
.ocr-field input{
  flex:1;padding:6px 10px;border:1.5px solid var(--border);
  border-radius:6px;font-size:12px;outline:none
}
.ocr-field input:focus{border-color:var(--green-mid)}

/* ── Progress checklist ──────────────────────────────────────── */
.checklist-item{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--border);font-size:13px
}
.checklist-item:last-child{border-bottom:none}
.check-icon{
  width:22px;height:22px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:12px;flex-shrink:0
}
.check-done{background:var(--green-lt);color:var(--green)}
.check-pending{background:var(--gray-lt);color:var(--gray)}
.check-active{background:var(--amber-lt);color:#b45309}

/* ── Repayment tabs ──────────────────────────────────────────── */
.rep-tabs{display:flex;gap:4px;margin-bottom:12px}
.rep-tab{
  flex:1;text-align:center;padding:8px 4px;border-radius:7px;
  font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);
  color:var(--text-2);transition:all .15s
}
.rep-tab.active{background:var(--green);color:#fff;border-color:var(--green)}

/* ── EMI result card ─────────────────────────────────────────── */
.emi-result{
  background:var(--green);color:#fff;border-radius:10px;
  padding:14px;margin:10px 0
}
.emi-result-label{font-size:11px;opacity:.8;margin-bottom:2px}
.emi-result-val{font-size:26px;font-weight:700}
.emi-result-sub{font-size:12px;opacity:.8;margin-top:4px}
.emi-split{display:flex;justify-content:space-between;margin-top:8px}
.emi-split-item{text-align:center}
.emi-split-item .val{font-size:16px;font-weight:700}
.emi-split-item .lab{font-size:10px;opacity:.7}

/* ── Month grid ──────────────────────────────────────────────── */
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
.month-btn{
  padding:8px 0;text-align:center;border-radius:7px;font-size:12px;
  font-weight:500;cursor:pointer;border:1.5px solid var(--border);
  color:var(--text-2);background:#fff;transition:all .15s
}
.month-btn.selected{background:var(--green);color:#fff;border-color:var(--green)}

/* ── Slider ──────────────────────────────────────────────────── */
.slider-wrap{margin:8px 0}
.slider-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-bottom:4px}
.slider-label .val{font-weight:700;color:var(--text)}
input[type=range]{width:100%;accent-color:var(--green)}

/* ── Info pill ───────────────────────────────────────────────── */
.info-pill{
  background:var(--green-lt);color:var(--green);
  border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:5px
}

/* ── Toast ───────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:opacity .3s;z-index:999;
  white-space:nowrap;pointer-events:none
}

/* ── Bottom action bar ───────────────────────────────────────── */
.bottom-bar{
  background:#fff;padding:12px 16px;border-top:1px solid var(--border);
  position:sticky;bottom:0
}

/* ── Log strip ───────────────────────────────────────────────── */
.log-strip{
  background:var(--gray-lt);border-radius:7px;padding:8px 10px;
  font-size:11px;color:var(--text-2);max-height:80px;overflow-y:auto
}
.log-entry{margin-bottom:3px}
.log-entry:last-child{margin-bottom:0}
.log-time{color:var(--green);margin-right:4px}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-logo">🏦</div>
  <div class="login-title">PM SVANidhi</div>
  <div class="login-sub">Agent Dashboard</div>
  <div class="login-card">
    <label>Agent Phone Number</label>
    <input type="tel" id="agentPhone" placeholder="Enter your mobile number" maxlength="10"/>
    <label>Password</label>
    <input type="password" id="agentPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')agentLogin()"/>
    <button class="btn-primary" onclick="agentLogin()">Login →</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════════════════════ -->
<div id="appShell">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🏦</span>
      <div>
        <div class="topbar-title">PM SVANidhi</div>
        <div class="topbar-sub">Agent Console</div>
      </div>
    </div>
    <span class="topbar-agent" id="agentBadge">Agent</span>
  </div>

  <!-- Phase tabs -->
  <div class="phase-tabs" id="phaseTabs">
    <div class="phase-tab active" data-phase="0" onclick="switchPhase(0)"><span class="dot"></span>Entry</div>
    <div class="phase-tab" data-phase="1" onclick="switchPhase(1)"><span class="dot"></span>Verify</div>
    <div class="phase-tab" data-phase="2" onclick="switchPhase(2)"><span class="dot"></span>Docs</div>
    <div class="phase-tab" data-phase="3" onclick="switchPhase(3)"><span class="dot"></span>Profile</div>
    <div class="phase-tab" data-phase="4" onclick="switchPhase(4)"><span class="dot"></span>KYC</div>
    <div class="phase-tab" data-phase="5" onclick="switchPhase(5)"><span class="dot"></span>Repay</div>
    <div class="phase-tab" data-phase="6" onclick="switchPhase(6)"><span class="dot"></span>Disburse</div>
  </div>

  <!-- Vendor strip -->
  <div class="vendor-strip">
    <div>
      <div class="vendor-num" id="vendorNumDisplay">No vendor loaded</div>
      <div style="font-size:11px;color:var(--text-2)" id="vendorStateDisplay">—</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <input type="tel" id="vendorPhoneInput" placeholder="91XXXXXXXXXX"
             style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:120px;outline:none"/>
      <button class="btn btn-green" style="padding:6px 10px;font-size:12px" onclick="loadVendor()">Load</button>
    </div>
  </div>

  <!-- Scroll area -->
  <div class="scroll-area" id="scrollArea">
    <div class="card" style="text-align:center;padding:32px 16px;color:var(--text-2)">
      <div style="font-size:28px;margin-bottom:8px">📋</div>
      <div style="font-size:13px">Load a vendor to begin</div>
    </div>
  </div>

  <!-- Bottom action bar -->
  <div class="bottom-bar" id="bottomBar" style="display:none">
    <div id="bottomAction"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const PASS   = (new URLSearchParams(location.search).get('pass')) || 'svanidhi2024';
let agentNum = '';
let vendor   = { phone: null, state: 'IDLE', data: {} };
let currentPhase = 0;

const ANNUAL_REVENUE    = 150000;
const MAX_LOAN          = 30000;
const INTEREST_RATE     = 0.10;
const MONTHS_IN_YEAR    = 12;
const DAYS_PER_MONTH    = 30;

const STATE_LABELS = {
  IDLE:'Not started', ONBOARDING:'Onboarding', COLLECT_PHONE:'Awaiting phone',
  COLLECT_UPI:'Awaiting UPI', CONSENT_GATE:'Consent gate',
  ELIGIBILITY_RESULT:'Eligibility shown', AWAIT_AADHAAR:'Awaiting Aadhaar',
  AWAIT_PAN:'Awaiting PAN', AWAIT_PASSBOOK:'Awaiting passbook',
  VIDEO_KYC:'Video KYC pending', AWAITING_APPROVAL:'Processing approval',
  REPAYMENT_MENU:'Repayment menu', MONTHLY_EMI:'Monthly EMI input',
  MONTHLY_CONFIRM:'Monthly confirm', SEASONAL_HIGH:'Seasonal high months',
  SEASONAL_LOW:'Seasonal high amount', SEASONAL_CONFIRM:'Seasonal confirm',
  MICRO_DAILY:'Micro daily input', MICRO_TENURE:'Micro tenure input',
  MICRO_CONFIRM:'Micro confirm', FINALIZED:'Complete'
};

// ── Log ───────────────────────────────────────────────────────
const logEntries = [];
function addLog(msg) {
  const t = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logEntries.unshift({ t, msg });
  if (logEntries.length > 20) logEntries.pop();
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = ok ? '#1a6e3c' : '#dc2626';
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2800);
}

// ── API helpers ───────────────────────────────────────────────
async function api(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(path + sep + 'pass=' + PASS, opts);
  return res.json();
}

async function agentAction(action, value = '') {
  if (!vendor.phone) { toast('Load a vendor first', false); return null; }
  addLog('Action: ' + action + (value ? ' = ' + value : ''));
  try {
    const data = await api('/agent/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ vendorPhone: vendor.phone, action, value }),
    });
    if (!data.ok) { toast(data.error || 'Action failed', false); return null; }
    vendor.state = data.newState || vendor.state;
    updateVendorStrip();
    toast('Done');
    return data;
  } catch (e) {
    toast('Network error', false);
    return null;
  }
}

// ══════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════
function agentLogin() {
  const phone = document.getElementById('agentPhone').value.trim() || '0000000000';
  const pass  = document.getElementById('agentPass').value.trim();
  if (!pass) { alert('Enter your password'); return; }
  agentNum = phone || 'Agent';
  const badge = phone.length >= 10 ? '+91 ' + phone.slice(-10) : 'Agent';
  document.getElementById('agentBadge').textContent = badge;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  addLog('Agent logged in');
  renderPhase(0);
}

// ══════════════════════════════════════════════════════════════
// VENDOR LOAD
// ══════════════════════════════════════════════════════════════
async function loadVendor() {
  let raw = document.getElementById('vendorPhoneInput').value.trim().replace(/\D/g, '');
  if (raw.length === 10) raw = '91' + raw;
  if (!raw) { toast('Enter a vendor phone number', false); return; }
  try {
    const data = await api('/agent/session/' + raw);
    vendor.phone = raw;
    vendor.state = data.state || 'IDLE';
    vendor.data  = data.data  || {};
    updateVendorStrip();
    addLog('Loaded vendor +' + raw + ' state=' + vendor.state);
    renderPhase(currentPhase);
    toast('Vendor loaded');
  } catch (e) {
    toast('Could not load vendor', false);
  }
}

function updateVendorStrip() {
  document.getElementById('vendorNumDisplay').textContent = vendor.phone ? '+' + vendor.phone : 'No vendor loaded';
  document.getElementById('vendorStateDisplay').textContent = STATE_LABELS[vendor.state] || vendor.state;
}

// ══════════════════════════════════════════════════════════════
// PHASE NAVIGATION
// ══════════════════════════════════════════════════════════════
function switchPhase(n) {
  currentPhase = n;
  document.querySelectorAll('.phase-tab').forEach((t, i) => {
    t.classList.toggle('active', i === n);
  });
  renderPhase(n);
}

function renderPhase(n) {
  const area = document.getElementById('scrollArea');
  const bar  = document.getElementById('bottomBar');
  const action = document.getElementById('bottomAction');
  bar.style.display = 'none';
  area.innerHTML = '';

  const phases = [
    renderPhase0, renderPhase1, renderPhase2,
    renderPhase3, renderPhase4, renderPhase5, renderPhase6
  ];
  if (phases[n]) phases[n](area, bar, action);
}

// ══════════════════════════════════════════════════════════════
// PHASE 0 — ENTRY & AUTHENTICATION
// ══════════════════════════════════════════════════════════════
function renderPhase0(area, bar, action) {
  area.innerHTML = `
    <div class="card">
      <div class="card-title">📩 Welcome message</div>
      <p style="font-size:12px;color:var(--text-2);margin-bottom:10px">
        Send the PM SVANidhi intro to vendor's WhatsApp with scheme image and options.
      </p>
      <button class="btn btn-green btn-full" onclick="sendWelcome()">
        ▶ Send welcome + scheme info
      </button>
    </div>

    <div class="card" id="beginCard">
      <div class="card-title">🛤️ Application mode</div>
      <div style="font-size:12px;color:var(--text-2);margin-bottom:10px">
        Once vendor responds, click below to join and notify them an agent has connected.
      </div>
      <button class="btn btn-green btn-full" onclick="beginApplication()">
        📞 Begin Application (notify vendor)
      </button>
    </div>

    <div class="card">
      <div class="card-title">📊 Session log</div>
      <div class="log-strip" id="logBox">
        ${logEntries.map(e => '<div class="log-entry"><span class="log-time">' + e.t + '</span>' + e.msg + '</div>').join('') || '<div style="color:var(--text-2)">No activity yet</div>'}
      </div>
    </div>
  `;
}

async function sendWelcome() {
  const ok = await agentAction('start_session');
  if (ok) { toast('Welcome message sent to vendor'); addLog('Welcome sent'); }
}

async function beginApplication() {
  const ok = await agentAction('begin_application');
  if (ok) {
    toast('Agent joined — vendor notified');
    addLog('Begin application sent');
    switchPhase(1);
  }
}

// ══════════════════════════════════════════════════════════════
// PHASE 1 — VERIFICATION (OTP)
// ══════════════════════════════════════════════════════════════
function renderPhase1(area, bar, action) {
  area.innerHTML = `
    <div class="card">
      <div class="card-title">📲 Number verification</div>
      <p style="font-size:12px;color:var(--text-2);margin-bottom:10px">
        Ask: "Is your mobile number linked to your Aadhaar or Bank Account?"
      </p>
      <div class="field">
        <label>Vendor's linked number</label>

async function submitPhone() {

  const ok = await agentAction('submit_phone', v);
  if (ok) {
    document.getElementById('otpCard').style.display = 'block';
    toast('OTP sent to vendor');
  }
}

function otpNext(el, nextId) {
  el.value = el.value.slice(-1);
  if (nextId && el.value) document.getElementById(nextId)?.focus();
}

async function verifyOtp() {
  const otp = ['otp1','otp2','otp3','otp4'].map(id => document.getElementById(id)?.value || '').join('');
  if (otp.length < 4) { toast('Enter all 4 OTP digits', false); return; }
  // Simulate OTP verification (in production, call real OTP API)
  toast('OTP verified!');
  document.getElementById('consentCard').style.display = 'block';
  addLog('OTP verified for vendor');
}

async function resendOtp() {
  if (!vendor.phone) { toast('Load vendor first', false); return; }
  toast('OTP resent to vendor');
  addLog('OTP resent');
  document.getElementById('otpCard').style.display = 'block';
}

async function giveConsent() {
  const ok = await agentAction('give_consent');

function renderSeasonal() {
  const loan     = LOAN();
  const interest = Math.round(loan * INTEREST_RATE);
  const total    = loan + interest;
  const months   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const peakCount = selMonths.length || 0;
  const leanCount = 12 - peakCount;
  const maxPeak   = parseInt(document.getElementById('peakSlider')?.value || 2400);
  const peakTotal = maxPeak * peakCount;
  const leanTotal = Math.max(total - peakTotal, 0);
  const leanEmi   = leanCount > 0 ? Math.ceil(leanTotal / leanCount) : 0;

  return `
    <p style="font-size:12px;color:var(--text-2);margin-bottom:8px">
      Tap to mark high-income (peak) months:
    </p>
    <div class="month-grid">

        <div class="emi-split-item">
          <div class="lab">${leanCount} lean months</div>
          <div class="val">₹${leanEmi.toLocaleString('en-IN')}</div>
        </div>
        <div class="emi-split-item">
          <div class="lab">Total payable</div>
          <div class="val">₹${total.toLocaleString('en-IN')}</div>
        </div>
      </div>
    </div>
    <button class="btn btn-green btn-full" onclick="confirmSeasonalPlan()">Confirm Flexible EMI →</button>

}

  document.getElementById('peakSliderVal').textContent = '₹' + parseInt(val).toLocaleString('en-IN');

  if (selMonths.length === 0) { toast('Select at least 1 peak month', false); return; }

}

  const loan      = LOAN();
  const interest  = Math.round(loan * INTEREST_RATE);
  const total     = loan + interest;
  const perHundred = parseInt(document.getElementById('microSlider')?.value || 40);
  const tenure    = parseInt(document.getElementById('microTenure')?.value || 12);
  const cutoff    = document.getElementById('microCutoff')?.value || '20';
  const dailyAmt  = Math.round((perHundred / 100) * 200); // per ₹200 earned

  const totalVia  = dailyAmt * totalDays;
  const sufficient = totalVia >= total;

  return `

      </div>
      <input type="range" id="microSlider" min="10" max="100" value="${perHundred}" step="5"
             oninput="updateMicro(this.value)"/>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-2)">
        <span>₹10</span><span>₹100</span>
      </div>
    </div>
    <div class="slider-wrap">
      <div class="slider-label">
        <span>Repayment tenure</span>
        <span class="val" id="microTenureVal">${tenure} months</span>
      </div>
      <input type="range" id="microTenure" min="6" max="12" value="${tenure}" step="1"
             oninput="updateMicro()"/>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-2)">
        <span>6 months</span><span>12 months</span>
      </div>
    </div>
    <div class="field">
      <label>Auto-debit cutoff date (day of month)</label>
      <input type="number" id="microCutoff" min="1" max="28" value="${cutoff}"
             oninput="updateMicro()" placeholder="e.g. 20"/>
    </div>
    <div class="emi-result" style="background:${sufficient?'var(--green)':'#b45309'}">
      <div class="emi-result-label">Daily auto-debit amount</div>
      <div class="emi-result-val">₹${dailyAmt.toLocaleString('en-IN')}</div>
      <div class="emi-result-sub">
        ${sufficient
          ? 'Covers ₹' + total.toLocaleString('en-IN') + ' in ' + tenure + ' months ✓'
          : 'Shortfall — suggest ₹' + suggested.toLocaleString('en-IN') + '/day to cover in ' + tenure + ' months'}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.2)">
        <div><div style="font-size:10px;opacity:.7">Auto-debit by</div><div style="font-weight:600">${cutoff}th</div></div>
        <div><div style="font-size:10px;opacity:.7">Due date</div><div style="font-weight:600">30th</div></div>
        <div><div style="font-size:10px;opacity:.7">Buffer</div><div style="font-weight:600">10 days</div></div>
      </div>
    </div>
    <button class="btn btn-green btn-full" onclick="confirmMicroPlan()">Set up Micro-Repayment →</button>
  `;
}

function updateMicro() {
  const val    = document.getElementById('microSlider')?.value;
  const tenure = document.getElementById('microTenure')?.value;
  if (val) document.getElementById('microSliderVal').textContent = '₹' + val;
  if (tenure) document.getElementById('microTenureVal').textContent = tenure + ' months';
  document.getElementById('repayContent').innerHTML = renderMicro();
}

async function confirmMicroPlan() {
  const daily  = document.getElementById('microSlider')?.value || '40';
  const tenure = document.getElementById('microTenure')?.value || '12';
  const ok1 = await agentAction('select_micro');
  const ok2 = ok1 && await agentAction('submit_repayment_number', String(Math.round(parseInt(daily)/100*200)));
  const ok3 = ok2 && await agentAction('submit_repayment_number', tenure);
  if (ok3) { toast('Micro-repayment plan confirmed'); switchPhase(6); }
}

// ══════════════════════════════════════════════════════════════
// PHASE 6 — DISBURSAL
// ══════════════════════════════════════════════════════════════
function renderPhase6(area, bar, action) {
  const steps = [
    { label: 'Entry & Authentication', done: true },
    { label: 'OTP Verification',       done: true },
    { label: 'Data consent & fetch',   done: true },
    { label: 'Document upload & OCR',  done: ocrDocIndex === 0 },
    { label: 'Profile & eligibility',  done: !!vendor.data.loanAmount },
    { label: 'Video KYC',              done: vendor.state === 'REPAYMENT_MENU' || vendor.state === 'FINALIZED' },
    { label: 'Repayment plan',         done: vendor.state === 'FINALIZED' },
  ];
  const allDone = steps.every(s => s.done);

  area.innerHTML = `
    <div class="card">
      <div class="card-title">🏁 Disbursal checklist</div>
      ${steps.map(s => `
        <div class="checklist-item">
          <div class="check-icon ${s.done ? 'check-done' : 'check-pending'}">${s.done ? '✓' : '○'}</div>
          <span style="font-size:13px;color:${s.done ? 'var(--text)' : 'var(--gray)'}">${s.label}</span>
        </div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">💸 Loan disbursement</div>
      <div class="data-row"><span class="data-key">Vendor</span><span class="data-val">+${vendor.phone || '—'}</span></div>
      <div class="data-row"><span class="data-key">Loan amount</span><span class="data-val" style="color:var(--green);font-weight:700">₹${(vendor.data.loanAmount || MAX_LOAN).toLocaleString('en-IN')}</span></div>
      <div class="data-row"><span class="data-key">Disbursement</span><span class="data-val">Next working day</span></div>
      <div class="data-row"><span class="data-key">Account</span><span class="data-val redacted">XXXX-${Math.floor(1000+Math.random()*9000)}</span></div>
    </div>

    ${allDone ? `
    <button class="btn btn-green btn-full" style="font-size:15px;padding:16px" onclick="approveDisbursement()">
      💸 Approve &amp; Disburse
    </button>` : `
    <div class="card card-amber">
      <div style="font-size:12px;color:#92400e">
        ⚠️ Complete all checklist steps before disbursing.
      </div>
    </div>`}
  `;
}

async function approveDisbursement() {
  const ok = await agentAction('proceed_plan');
  if (ok) {
    toast('Loan disbursed! Vendor notified on WhatsApp');
    addLog('Loan disbursed for +' + vendor.phone);
    // Show success state
    const area = document.getElementById('scrollArea');
    area.innerHTML += `
      <div class="card card-green" style="text-align:center;padding:24px">
        <div style="font-size:36px;margin-bottom:8px">🎉</div>
        <div style="font-size:16px;font-weight:700;color:var(--green)">Loan Approved & Disbursed!</div>
        <div style="font-size:12px;color:var(--text-2);margin-top:6px">
          Ref: SVAN-${Date.now().toString().slice(-8)}<br/>
          Vendor has received confirmation on WhatsApp.
        </div>
      </div>`;
  }
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
// Auto-login if pass param is in URL — skip login screen entirely
const autoPass = new URLSearchParams(location.search).get('pass');
if (autoPass) {
  document.getElementById('agentPass').value = autoPass;
  document.getElementById('agentPhone').value = '0000000000';
  agentLogin();
}
</script>
</body>
</html>
