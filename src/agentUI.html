<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=360px, initial-scale=1, maximum-scale=1"/>
<title>PM SVANidhi — Agent Dashboard</title>
<style>
:root {
  --green:     #1a6e3c;
  --green-mid: #2d9e5f;
  --green-lt:  #e8f5ee;
  --green-pale:#f4fbf7;
  --amber:     #f59e0b;
  --amber-lt:  #fef9ec;
  --red:       #dc2626;
  --red-lt:    #fef2f2;
  --blue:      #2563eb;
  --blue-lt:   #eff6ff;
  --gray:      #6b7280;
  --gray-lt:   #f9fafb;
  --border:    #e5e7eb;
  --text:      #111827;
  --text-2:    #6b7280;
  --white:     #ffffff;
  --radius:    10px;
  --shadow:    0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#f0f2f0;
  color:var(--text);
  font-size:14px;
  width:360px;
  min-height:800px;
  margin:0 auto;
  position:relative;
  overflow-x:hidden;
}
/* ── Login ────────────────────────────────────────────────────── */
#loginScreen{
  min-height:800px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg,#0f4025 0%,#1a6e3c 60%,#2d9e5f 100%);
}
.login-logo{font-size:32px;margin-bottom:8px}
.login-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:36px}
.login-card{
  background:#fff;border-radius:16px;padding:24px;width:100%;
  box-shadow:0 8px 32px rgba(0,0,0,.18)
}
.login-card label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.login-card input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);
  border-radius:8px;font-size:15px;outline:none;margin-bottom:16px;
  transition:border .2s
}
.login-card input:focus{border-color:var(--green-mid)}
.btn-primary{
  width:100%;padding:14px;background:var(--green);color:#fff;
  border:none;border-radius:8px;font-size:15px;font-weight:600;
  cursor:pointer;transition:background .15s
}
.btn-primary:active{background:#0f4025}

/* ── App shell ────────────────────────────────────────────────── */
#appShell{display:none;flex-direction:column;min-height:800px}

/* ── Top bar ─────────────────────────────────────────────────── */
.topbar{
  background:var(--green);color:#fff;padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100
}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{font-size:20px}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:11px;opacity:.75}
.topbar-agent{
  background:rgba(255,255,255,.2);border-radius:20px;
  padding:4px 10px;font-size:12px;font-weight:500
}

/* ── Phase tabs ──────────────────────────────────────────────── */
.phase-tabs{
  display:flex;background:#fff;border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;padding:0 8px
}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-tab{
  flex-shrink:0;padding:10px 12px;font-size:11px;font-weight:600;
  color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .15s
}
.phase-tab.active{color:var(--green);border-bottom-color:var(--green)}
.phase-tab.done{color:var(--green-mid)}
.phase-tab .dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--border);margin-right:4px;vertical-align:middle
}
.phase-tab.done .dot{background:var(--green-mid)}
.phase-tab.active .dot{background:var(--green)}
/* ── Live sync indicator ─────────────────────────────────────── */
#syncBadge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.15);border-radius:20px;
  padding:3px 9px;font-size:11px;font-weight:500;color:#fff
}
#syncDot{
  width:7px;height:7px;border-radius:50%;background:#86efac;
  animation:syncpulse 2s infinite
}
#syncDot.stale{background:#fca5a5;animation:none}
@keyframes syncpulse{
  0%,100%{opacity:1} 50%{opacity:.4}
}

/* ── Vendor strip ────────────────────────────────────────────── */
.vendor-strip{
  background:#fff;padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border)
}
.vendor-num{font-size:13px;font-weight:600}
.vendor-state{
  font-size:11px;padding:3px 8px;border-radius:12px;font-weight:500
}
.state-idle{background:var(--gray-lt);color:var(--gray)}
.state-active{background:var(--green-lt);color:var(--green)}
.state-waiting{background:var(--amber-lt);color:#b45309}
.state-done{background:var(--green-lt);color:var(--green)}

/* ── Scroll area ─────────────────────────────────────────────── */
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}

/* ── Cards ───────────────────────────────────────────────────── */
.card{
  background:#fff;border-radius:var(--radius);padding:14px;
  box-shadow:var(--shadow);border:1px solid var(--border)
}
.card-title{font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.card-green{background:var(--green-pale);border-color:#c3e6d4}
.card-amber{background:var(--amber-lt);border-color:#fde68a}
.card-red{background:var(--red-lt);border-color:#fca5a5}

/* ── Form elements ───────────────────────────────────────────── */
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.field input,.field select,.field textarea{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);
  border-radius:7px;font-size:13px;outline:none;background:#fff;
  color:var(--text);transition:border .2s
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green-mid)}
.field textarea{resize:none;height:64px}

/* ── Buttons ─────────────────────────────────────────────────── */
.btn{
  padding:9px 14px;border-radius:7px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;display:inline-flex;
  align-items:center;gap:6px
}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#0f4025}
.btn-green-outline{background:transparent;border:1.5px solid var(--green);color:var(--green)}
.btn-amber{background:var(--amber);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-gray{background:var(--gray-lt);color:var(--text);border:1px solid var(--border)}
.btn-full{width:100%;justify-content:center;padding:12px}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1;justify-content:center}

/* ── OTP box ─────────────────────────────────────────────────── */
.otp-row{display:flex;gap:8px;margin-bottom:8px}
.otp-row input{
  flex:1;text-align:center;font-size:20px;font-weight:700;
  padding:10px 0;border:2px solid var(--border);border-radius:8px;
  letter-spacing:2px
}
.otp-row input:focus{border-color:var(--green)}

/* ── Data rows ───────────────────────────────────────────────── */
.data-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--border);font-size:13px
}
.data-row:last-child{border-bottom:none}
.data-key{color:var(--text-2);font-size:12px}
.data-val{font-weight:500;color:var(--text)}
.data-val.redacted{color:var(--gray);font-family:monospace;font-size:12px;letter-spacing:1px}

/* ── OCR preview ─────────────────────────────────────────────── */
.ocr-img{
  width:100%;height:120px;object-fit:cover;border-radius:7px;
  border:1px solid var(--border);margin-bottom:10px;background:var(--gray-lt);
  display:flex;align-items:center;justify-content:center;color:var(--text-2);
  font-size:12px
}
.ocr-field{
  display:flex;gap:6px;align-items:center;margin-bottom:6px
}
.ocr-field label{font-size:11px;color:var(--text-2);white-space:nowrap;min-width:80px}
.ocr-field input{
  flex:1;padding:6px 10px;border:1.5px solid var(--border);
  border-radius:6px;font-size:12px;outline:none
}
.ocr-field input:focus{border-color:var(--green-mid)}

/* ── Progress checklist ──────────────────────────────────────── */
.checklist-item{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--border);font-size:13px
}
.checklist-item:last-child{border-bottom:none}
.check-icon{
  width:22px;height:22px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:12px;flex-shrink:0
}
.check-done{background:var(--green-lt);color:var(--green)}
.check-pending{background:var(--gray-lt);color:var(--gray)}
.check-active{background:var(--amber-lt);color:#b45309}

/* ── Repayment tabs ──────────────────────────────────────────── */
.rep-tabs{display:flex;gap:4px;margin-bottom:12px}
.rep-tab{
  flex:1;text-align:center;padding:8px 4px;border-radius:7px;
  font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);
  color:var(--text-2);transition:all .15s
}
.rep-tab.active{background:var(--green);color:#fff;border-color:var(--green)}

/* ── EMI result card ─────────────────────────────────────────── */
.emi-result{
  background:var(--green);color:#fff;border-radius:10px;
  padding:14px;margin:10px 0
}
.emi-result-label{font-size:11px;opacity:.8;margin-bottom:2px}
.emi-result-val{font-size:26px;font-weight:700}
.emi-result-sub{font-size:12px;opacity:.8;margin-top:4px}
.emi-split{display:flex;justify-content:space-between;margin-top:8px}
.emi-split-item{text-align:center}
.emi-split-item .val{font-size:16px;font-weight:700}
.emi-split-item .lab{font-size:10px;opacity:.7}

/* ── Month grid ──────────────────────────────────────────────── */
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
.month-btn{
  padding:8px 0;text-align:center;border-radius:7px;font-size:12px;
  font-weight:500;cursor:pointer;border:1.5px solid var(--border);
  color:var(--text-2);background:#fff;transition:all .15s
}
.month-btn.selected{background:var(--green);color:#fff;border-color:var(--green)}

/* ── Slider ──────────────────────────────────────────────────── */
.slider-wrap{margin:8px 0}
.slider-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-bottom:4px}
.slider-label .val{font-weight:700;color:var(--text)}
input[type=range]{width:100%;accent-color:var(--green)}

/* ── Info pill ───────────────────────────────────────────────── */
.info-pill{
  background:var(--green-lt);color:var(--green);
  border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:5px
}

/* ── Toast ───────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:opacity .3s;z-index:999;
  white-space:nowrap;pointer-events:none
}

/* ── Bottom action bar ───────────────────────────────────────── */
.bottom-bar{
  background:#fff;padding:12px 16px;border-top:1px solid var(--border);
  position:sticky;bottom:0
}

/* ── Log strip ───────────────────────────────────────────────── */
.log-strip{
  background:var(--gray-lt);border-radius:7px;padding:8px 10px;
  font-size:11px;color:var(--text-2);max-height:80px;overflow-y:auto
}
.log-entry{margin-bottom:3px}
.log-entry:last-child{margin-bottom:0}
.log-time{color:var(--green);margin-right:4px}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-logo">🏦</div>
  <div class="login-title">PM SVANidhi</div>
  <div class="login-sub">Agent Dashboard</div>
  <div class="login-card">
    <label>Agent Phone Number</label>
    <input type="tel" id="agentPhone" placeholder="Enter your mobile number" maxlength="10"/>
    <label>Password</label>
    <input type="password" id="agentPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')agentLogin()"/>
    <button class="btn-primary" onclick="agentLogin()">Login →</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════════════════════ -->
<div id="appShell">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🏦</span>
      <div>
        <div class="topbar-title">PM SVANidhi</div>
        <div class="topbar-sub">Agent Console</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="topbar-agent" id="agentBadge">Agent</span>
      <span id="syncBadge" style="display:none"><span id="syncDot"></span><span id="syncLabel">Live</span></span>
    </div>
  </div>

  <!-- Phase tabs -->
  <div class="phase-tabs" id="phaseTabs">
    <div class="phase-tab active" data-phase="0" onclick="switchPhase(0)"><span class="dot"></span>Entry</div>
    <div class="phase-tab" data-phase="1" onclick="switchPhase(1)"><span class="dot"></span>Verify</div>
    <div class="phase-tab" data-phase="2" onclick="switchPhase(2)"><span class="dot"></span>Docs</div>
    <div class="phase-tab" data-phase="3" onclick="switchPhase(3)"><span class="dot"></span>Profile</div>
    <div class="phase-tab" data-phase="4" onclick="switchPhase(4)"><span class="dot"></span>KYC</div>
    <div class="phase-tab" data-phase="5" onclick="switchPhase(5)"><span class="dot"></span>Repay</div>
    <div class="phase-tab" data-phase="6" onclick="switchPhase(6)"><span class="dot"></span>Disburse</div>
  </div>

  <!-- Vendor strip -->
  <div class="vendor-strip">
    <div>
      <div class="vendor-num" id="vendorNumDisplay">No vendor loaded</div>
      <div style="font-size:11px;color:var(--text-2)" id="vendorStateDisplay">—</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <input type="tel" id="vendorPhoneInput" placeholder="91XXXXXXXXXX"
             style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:120px;outline:none"/>
      <button class="btn btn-green" style="padding:6px 10px;font-size:12px" onclick="loadVendor()">Load</button>
    </div>
  </div>

  <!-- Scroll area -->
  <div class="scroll-area" id="scrollArea">
    <div class="card" style="text-align:center;padding:32px 16px;color:var(--text-2)">
      <div style="font-size:28px;margin-bottom:8px">📋</div>
      <div style="font-size:13px">Load a vendor to begin</div>
    </div>
  </div>

  <!-- Bottom action bar -->
  <div class="bottom-bar" id="bottomBar" style="display:none">
    <div id="bottomAction"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const PASS   = (new URLSearchParams(location.search).get('pass')) || 'svanidhi2024';
let agentNum = '';
let vendor   = { phone: null, state: 'IDLE', data: {} };
let currentPhase = 0;

// Constants defined in Phase 5 section below (ANNUAL_REV, MAX_LOAN, RATE)

const STATE_LABELS = {
  IDLE:'Not started', ONBOARDING:'Onboarding', COLLECT_PHONE:'Awaiting phone',
  COLLECT_UPI:'Awaiting UPI', CONSENT_GATE:'Consent gate',
  ELIGIBILITY_RESULT:'Eligibility shown', AWAIT_AADHAAR:'Awaiting Aadhaar',
  AWAIT_PAN:'Awaiting PAN', AWAIT_PASSBOOK:'Awaiting passbook', AWAIT_QR:'Awaiting QR/UPI', PROFILING_REFS:'Collecting references', PROFILING_FINANCE:'Financial consent', LOAN_SELECTION:'Loan amount input', KYC_READINESS:'KYC readiness check',
  VIDEO_KYC:'Video KYC pending', AWAITING_APPROVAL:'Processing approval',
  REPAYMENT_MENU:'Repayment menu', MONTHLY_EMI:'Monthly EMI input',
  MONTHLY_CONFIRM:'Monthly confirm', SEASONAL_HIGH:'Seasonal high months',
  SEASONAL_LOW:'Seasonal high amount', SEASONAL_CONFIRM:'Seasonal confirm',
  MICRO_DAILY:'Micro daily input', MICRO_TENURE:'Micro tenure input',
  MICRO_CONFIRM:'Micro confirm', FINALIZED:'Complete'
};

// ── Log ───────────────────────────────────────────────────────
const logEntries = [];
function addLog(msg) {
  const t = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logEntries.unshift({ t, msg });
  if (logEntries.length > 20) logEntries.pop();
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = ok ? '#1a6e3c' : '#dc2626';
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2800);
}

// ── API helpers ───────────────────────────────────────────────
async function api(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(path + sep + 'pass=' + PASS, opts);
  return res.json();
}

async function agentAction(action, value = '') {
  if (!vendor.phone) { toast('Load a vendor first', false); return null; }
  addLog('Action: ' + action + (value ? ' = ' + value : ''));
  try {
    const data = await api('/agent/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ vendorPhone: vendor.phone, action, value }),
    });
    if (!data.ok) { toast(data.error || 'Action failed', false); return null; }
    // Fetch full updated session to sync data fields too
    try {
      const sess = await fetch('/agent/session/' + vendor.phone + '?pass=' + PASS);
      const sessData = await sess.json();
      vendor.state = sessData.state || data.newState || vendor.state;
      vendor.data  = sessData.data  || vendor.data;
    } catch (_) {
      vendor.state = data.newState || vendor.state;
    }
    updateVendorStrip();
    toast('Done');
    return data;
  } catch (e) {
    toast('Network error', false);
    return null;
  }
}

// ══════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════
function agentLogin() {
  const phone = document.getElementById('agentPhone').value.trim() || '0000000000';
  const pass  = document.getElementById('agentPass').value.trim();
  if (!pass) { alert('Enter your password'); return; }
  agentNum = phone || 'Agent';
  const badge = phone.length >= 10 ? '+91 ' + phone.slice(-10) : 'Agent';
  document.getElementById('agentBadge').textContent = badge;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  addLog('Agent logged in');
  renderPhase(0);
}

// ══════════════════════════════════════════════════════════════
// VENDOR LOAD
// ══════════════════════════════════════════════════════════════
async function loadVendor() {
  let raw = document.getElementById('vendorPhoneInput').value.trim().replace(/\D/g, '');
  if (raw.length === 10) raw = '91' + raw;
  if (!raw) { toast('Enter a vendor phone number', false); return; }
  try {
    const data = await api('/agent/session/' + raw);
    vendor.phone = raw;
    vendor.state = data.state || 'IDLE';
    vendor.data  = data.data  || {};
    updateVendorStrip();
    addLog('Loaded vendor +' + raw + ' state=' + vendor.state);
    // Auto-switch to the phase matching vendor's current state
    const targetPhase = STATE_TO_PHASE[vendor.state];
    if (targetPhase !== undefined) {
      currentPhase = targetPhase;
      document.querySelectorAll('.phase-tab').forEach((t, i) => {
        t.classList.toggle('active', i === targetPhase);
      });
    }
    renderPhase(currentPhase);
    startPolling();
    toast('Vendor loaded — live sync active');
  } catch (e) {
    toast('Could not load vendor', false);
  }
}

function updateVendorStrip() {
  document.getElementById('vendorNumDisplay').textContent = vendor.phone ? '+' + vendor.phone : 'No vendor loaded';
  document.getElementById('vendorStateDisplay').textContent = STATE_LABELS[vendor.state] || vendor.state;
}

// ══════════════════════════════════════════════════════════════
// PHASE NAVIGATION
// ══════════════════════════════════════════════════════════════
function switchPhase(n) {
  currentPhase = n;
  document.querySelectorAll('.phase-tab').forEach((t, i) => {
    t.classList.toggle('active', i === n);
  });
  renderPhase(n);
}

function renderPhase(n) {
  const area = document.getElementById('scrollArea');
  const bar  = document.getElementById('bottomBar');
  const action = document.getElementById('bottomAction');
  bar.style.display = 'none';
  area.innerHTML = '';

  const phases = [
    renderPhase0, renderPhase1, renderPhase2,
    renderPhase3, renderPhase4, renderPhase5, renderPhase6
  ];
  if (phases[n]) phases[n](area, bar, action);
}

// ══════════════════════════════════════════════════════════════
// PHASE 0 — ENTRY & AUTHENTICATION
// ══════════════════════════════════════════════════════════════
function renderPhase0(area, bar, action) {
  const stateColor = { IDLE:'var(--gray)', ONBOARDING:'var(--green)' };
  const welcomed = vendor.state !== 'IDLE';
  const started  = ['COLLECT_PHONE','COLLECT_UPI','CONSENT_GATE','ELIGIBILITY_RESULT',
                    'AWAIT_AADHAAR','AWAIT_PAN','AWAIT_PASSBOOK','VIDEO_KYC',
                    'AWAITING_APPROVAL','REPAYMENT_MENU','FINALIZED'].includes(vendor.state);

  area.innerHTML = `
    <div class="card">
      <div class="card-title">📩 Welcome message</div>
      <p style="font-size:12px;color:var(--text-2);margin-bottom:10px">
        Send the PM SVANidhi intro with scheme image and application options to vendor's WhatsApp.
      </p>
      ${welcomed
        ? '<div style="background:var(--green-lt);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:8px">✅ Welcome message sent</div>'
        : ''}
      <button class="btn ${welcomed ? 'btn-gray' : 'btn-green'} btn-full" onclick="sendWelcome()">
        ${welcomed ? '🔄 Resend welcome' : '📩 Send welcome + scheme info'}
      </button>
    </div>

    <div class="card ${started ? 'card-green' : ''}">
      <div class="card-title">🛤️ Begin Application</div>
      <div style="font-size:12px;color:var(--text-2);margin-bottom:10px">
        Once vendor responds, click below. The chatbot will send:<br/>
        <em style="color:var(--text)">"An agent has joined to assist you."</em>
      </div>
      ${started
        ? '<div style="background:var(--green-lt);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:8px">✅ Application started — vendor notified</div>'
        : ''}
      <button class="btn ${started ? 'btn-gray' : 'btn-green'} btn-full" onclick="beginApplication()">
        ${started ? '🔄 Restart application' : '📞 Begin Application (notify vendor)'}
      </button>
    </div>

    <div class="card">
      <div class="card-title">📊 Agent number</div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
        <span style="font-size:13px;color:var(--text-2)">Helpline</span>
        <span style="font-size:15px;font-weight:700;color:var(--green)">880046121</span>
      </div>
      <p style="font-size:11px;color:var(--text-2)">Mon–Sat, 9 AM – 6 PM</p>
    </div>

    <div class="card">
      <div class="card-title">📊 Session log</div>
      <div class="log-strip" id="logBox">
        ${logEntries.map(e => '<div class="log-entry"><span class="log-time">' + e.t + '</span>' + e.msg + '</div>').join('') || '<div style="color:var(--text-2)">No activity yet</div>'}
      </div>
    </div>
  `;
}

async function sendWelcome() {
  const ok = await agentAction('start_session');
  if (ok) { toast('Welcome message sent to vendor'); addLog('Welcome sent'); renderPhase(0); }
}

async function beginApplication() {
  const ok = await agentAction('begin_application');
  if (ok) {
    toast('Agent joined — vendor notified');
    addLog('Begin application — agent joined');
    switchPhase(1);
  }
}

// ══════════════════════════════════════════════════════════════
// PHASE 1 — VERIFICATION & IDENTITY FETCH
// Flow: DB path → Phone → OTP → Consent → Aadhaar/Bank DB → Eligibility
// ══════════════════════════════════════════════════════════════

// Sub-step tracker for Phase 1 (persists during renderPhase1 re-renders)
let p1Step = 'dbpath'; // dbpath | phone | otp | consent | fetched | eligibility

function renderPhase1(area, bar, action) {
  // Derive step from live session state when possible
  const s = vendor.state;
  const d = vendor.data || {};

  if (s === 'CONSENT_GATE')        p1Step = 'consent';
  else if (s === 'ELIGIBILITY_RESULT') {
    p1Step = d.fetchedName ? 'eligibility' : 'fetched';
  }
  else if (d.otpSent && !d.otpVerified) p1Step = 'otp';
  else if (d.dbPath && !d.phone)        p1Step = 'phone';

  // Progress bar for the 5 sub-steps
  const steps = ['dbpath','phone','otp','consent','fetched','eligibility'];
  const stepLabels = ['Path','Number','OTP','Consent','DB Fetch','Result'];
  const curIdx = Math.max(0, steps.indexOf(p1Step));

  area.innerHTML = `
    <!-- Progress stepper -->
    <div class="card" style="padding:12px 16px">
      <div style="display:flex;align-items:center;gap:0">
        ${stepLabels.map((lbl, i) => `
          <div style="flex:1;text-align:center">
            <div style="width:22px;height:22px;border-radius:50%;margin:0 auto 3px;
                 display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
                 background:${i < curIdx ? 'var(--green)' : i === curIdx ? 'var(--green)' : 'var(--border)'};
                 color:${i <= curIdx ? '#fff' : 'var(--gray)'}">
              ${i < curIdx ? '✓' : i+1}
            </div>
            <div style="font-size:9px;color:${i <= curIdx ? 'var(--green)' : 'var(--text-2)'};">${lbl}</div>
          </div>
          ${i < stepLabels.length - 1 ? `<div style="flex:0 0 8px;height:2px;background:${i < curIdx ? 'var(--green)' : 'var(--border)'};margin-bottom:12px"></div>` : ''}
        `).join('')}
      </div>
    </div>

    <!-- Step: DB Path selection -->
    <div class="card ${p1Step === 'dbpath' ? '' : ''}" id="card-dbpath"
         style="display:${['dbpath','phone'].includes(p1Step) ? 'block' : 'none'}">
      <div class="card-title">📲 Identity source</div>
      <p style="font-size:12px;color:var(--text-2);margin-bottom:12px">
        Ask the vendor: <em>"Is your mobile number linked to your Aadhaar or your Bank Account?"</em>
      </p>
      ${d.dbPath
        ? `<div style="background:var(--green-lt);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:10px">
             ✅ Path selected: <strong>${d.dbPath === 'aadhaar' ? '🪪 Aadhaar-linked' : '🏦 Bank-linked'}</strong>
           </div>`
        : ''}
      <div class="btn-row">
        <button class="btn ${d.dbPath === 'aadhaar' ? 'btn-green' : 'btn-gray'}" onclick="selectDbPath('aadhaar')">
          🪪 Aadhaar-linked
        </button>
        <button class="btn ${d.dbPath === 'bank' ? 'btn-green' : 'btn-gray'}" onclick="selectDbPath('bank')">
          🏦 Bank-linked
        </button>
      </div>
    </div>

    <!-- Step: Phone number -->
    <div id="card-phone"
         style="display:${['phone','otp'].includes(p1Step) ? 'block' : 'none'}">
      <div class="card">
        <div class="card-title">📱 Phone number</div>
        <p style="font-size:12px;color:var(--text-2);margin-bottom:10px">
          ${d.dbPath === 'bank'
            ? 'Ask for the number <strong>linked to their bank account</strong>.'
            : 'Ask for the number <strong>linked to their Aadhaar card</strong>.'}
        </p>
        ${d.phone
          ? `<div style="background:var(--green-lt);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:10px">
               ✅ Number on file: ${d.phone.slice(0,2)}XXXXXX${d.phone.slice(-2)}
             </div>`
          : ''}
        <div class="field">
          <label>Vendor's linked mobile number</label>
          <input type="tel" id="verifyPhone" placeholder="10-digit number" maxlength="10"
                 value="${d.phone || ''}"/>
        </div>
        <div class="btn-row">
          <button class="btn btn-green" onclick="submitPhone()">📤 Send OTP</button>
          <button class="btn btn-gray"  onclick="resendOtp()">🔄 Resend OTP</button>
        </div>
      </div>
    </div>

    <!-- Step: OTP verification -->
    <div id="card-otp"
         style="display:${['otp','consent'].includes(p1Step) ? 'block' : 'none'}">
      <div class="card">
        <div class="card-title">🔐 OTP verification</div>
        <p style="font-size:12px;color:var(--text-2);margin-bottom:10px">
          Vendor received a 4-digit OTP on their number. Ask them to read it out.
        </p>
        ${d.otpVerified
          ? `<div style="background:var(--green-lt);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:8px">✅ OTP verified</div>`
          : ''}
        <div class="otp-row" id="otpInputRow" style="${d.otpVerified ? 'display:none' : ''}">
          <input type="tel" id="otp1" maxlength="1" oninput="otpNext(this,'otp2')"/>
          <input type="tel" id="otp2" maxlength="1" oninput="otpNext(this,'otp3')"/>
          <input type="tel" id="otp3" maxlength="1" oninput="otpNext(this,'otp4')"/>
          <input type="tel" id="otp4" maxlength="1" oninput="otpNext(this,null)"/>
        </div>
        <div class="btn-row" style="${d.otpVerified ? 'display:none' : ''}">
          <button class="btn btn-green" onclick="verifyOtp()">✓ Verify OTP</button>
          <button class="btn btn-gray"  onclick="resendOtp()">🔄 Resend</button>
        </div>
      </div>
    </div>

    <!-- Step: Data consent -->
    <div id="card-consent"
         style="display:${['consent','fetched','eligibility'].includes(p1Step) ? 'block' : 'none'}">
      <div class="card">
        <div class="card-title">📑 Data access consent</div>
        <p style="font-size:12px;color:var(--text-2);margin-bottom:10px">
          Read to vendor: <em>"May we fetch your details from the
          ${d.dbPath === 'bank' ? 'Bank database' : 'Aadhaar (UIDAI) database'}
          to verify identity and check eligibility?"</em>
        </p>
        ${d.consentGiven
          ? `<div style="background:var(--green-lt);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:8px">✅ Consent recorded</div>`
          : ''}
        <div class="btn-row">
          <button class="btn btn-green" onclick="giveConsent()">✓ Vendor agrees</button>
          <button class="btn btn-red"   onclick="agentAction('decline_consent').then(() => renderPhase(1))">✗ Declined</button>
        </div>
      </div>
    </div>

    <!-- Step: Fetched DB data -->
    <div id="card-fetched"
         style="display:${['fetched','eligibility'].includes(p1Step) ? 'block' : 'none'}">
      <div class="card ${d.fetchedName ? 'card-green' : ''}">
        <div class="card-title">
          ${d.dbPath === 'bank' ? '🏦 Bank DB — details retrieved' : '🪪 Aadhaar DB — details retrieved'}
        </div>
        ${d.fetchedName ? `
          <div class="data-row"><span class="data-key">Name</span>
            <span class="data-val">${d.fetchedName || '—'}</span></div>
          ${d.dbPath === 'bank' ? `
            <div class="data-row"><span class="data-key">Account</span>
              <span class="data-val redacted">${d.fetchedAccount || 'XXXX-XXXX-XXXX'}</span></div>
            <div class="data-row"><span class="data-key">Bank</span>
              <span class="data-val">${d.fetchedBank || '—'}</span></div>
            <div class="data-row"><span class="data-key">IFSC</span>
              <span class="data-val">${d.fetchedIfsc || '—'}</span></div>
          ` : `
            <div class="data-row"><span class="data-key">Aadhaar</span>
              <span class="data-val redacted">${d.fetchedAadhaar || 'XXXX-XXXX-XXXX'}</span></div>
            <div class="data-row"><span class="data-key">DOB</span>
              <span class="data-val">${d.fetchedDob || '—'}</span></div>
          `}
          <div class="data-row" style="align-items:flex-start"><span class="data-key">Address</span>
            <span class="data-val" style="font-size:11px;text-align:right">${d.fetchedAddress || '—'}</span></div>
          <div style="margin-top:10px">
            <button class="btn btn-green btn-full" onclick="proceedEligibility()">
              ✓ Details confirmed — check eligibility
            </button>
          </div>
        ` : `
          <p style="font-size:12px;color:var(--text-2)">Waiting for consent to fetch data...</p>
        `}
      </div>
    </div>

    <!-- Step: Eligibility result -->
    <div id="card-eligibility"
         style="display:${p1Step === 'eligibility' ? 'block' : 'none'}">
      <div class="card card-green">
        <div class="card-title">💰 Loan eligibility result</div>
        <div class="data-row">
          <span class="data-key">Eligible loan</span>
          <span class="data-val" style="color:var(--green);font-size:16px;font-weight:700">₹25,000</span>
        </div>
        <div class="data-row"><span class="data-key">Interest rate</span><span class="data-val">7% p.a.</span></div>
        <div class="data-row"><span class="data-key">Processing fee</span><span class="data-val">₹0</span></div>
        <div class="data-row"><span class="data-key">Tenure</span><span class="data-val">3–12 months</span></div>
        <button class="btn btn-green btn-full" style="margin-top:12px" onclick="confirmAndProceedDocs()">
          ✓ Vendor agrees — proceed to documents →
        </button>
      </div>
    </div>
  `;
}

async function selectDbPath(path) {
  const ok = await agentAction('select_db_path', path);
  if (ok) {
    p1Step = 'phone';
    addLog('DB path selected: ' + path);
    renderPhase(1);
  }
}

async function submitPhone() {
  const v = document.getElementById('verifyPhone').value.trim();
  if (!/^\d{10}$/.test(v)) { toast('Enter a valid 10-digit number', false); return; }
  const ok = await agentAction('submit_phone', v);
  if (ok) {
    p1Step = 'otp';
    toast('OTP sent to vendor');
    addLog('OTP sent to ' + v.slice(0,2) + 'XXXXXX' + v.slice(-2));
    renderPhase(1);
  }
}

function otpNext(el, nextId) {
  el.value = el.value.slice(-1);
  if (nextId && el.value) document.getElementById(nextId)?.focus();
}

async function verifyOtp() {
  const otp = ['otp1','otp2','otp3','otp4'].map(id => document.getElementById(id)?.value || '').join('');
  if (otp.length < 4) { toast('Enter all 4 OTP digits', false); return; }
  const ok = await agentAction('verify_otp', otp);
  if (ok) {
    p1Step = 'consent';
    toast('OTP verified');
    addLog('OTP verified');
    renderPhase(1);
  }
}

async function resendOtp() {
  if (!vendor.phone) { toast('Load vendor first', false); return; }
  const phone = document.getElementById('verifyPhone')?.value || vendor.data?.phone || '';
  if (phone) {
    const ok = await agentAction('submit_phone', phone);
    if (ok) { toast('OTP resent'); addLog('OTP resent'); p1Step = 'otp'; renderPhase(1); }
  }
}

async function giveConsent() {
  const ok = await agentAction('give_consent');
  if (ok) {
    p1Step = 'fetched';
    toast('Consent given — fetching DB data');
    addLog('Consent given, data fetched from ' + (vendor.data?.dbPath || 'DB'));
    renderPhase(1);
  }
}

async function proceedEligibility() {
  const ok = await agentAction('proceed_eligibility');
  if (ok) {
    p1Step = 'eligibility';
    toast('Eligibility confirmed');
    addLog('Eligibility check passed');
    renderPhase(1);
  }
}

async function confirmAndProceedDocs() {
  const ok = await agentAction('proceed_final_eligibility');
  if (ok) {
    toast('Proceeding to document upload');
    addLog('Eligibility accepted — moving to docs');
    switchPhase(2);
  }
}

// ══════════════════════════════════════════════════════════════
// PHASE 2 — DOCUMENT UPLOAD & OCR
// Sequence: 1. Aadhaar/Voter ID → 2. Bank Passbook → 3. UPI QR
// Each doc: agent sees image preview + editable OCR fields → Approve/Retry
// On Approve: bot sends extracted details back to vendor
// ══════════════════════════════════════════════════════════════

// Doc config — each entry maps to a session docs key + field schema
const DOC_DEFS = [
  {
    key:     'aadhaar',
    label:   'Aadhaar / Voter ID',
    emoji:   '🪪',
    state:   'AWAIT_AADHAAR',
    fields:  [
      { key: 'ocrName',     label: 'Name',       placeholder: 'Full name from document' },
      { key: 'ocrIdNumber', label: 'ID Number',   placeholder: 'Aadhaar / Voter ID number', redact: true },
      { key: 'ocrDob',      label: 'Date of Birth', placeholder: 'DD-MM-YYYY' },
    ],
  },
  {
    key:     'passbook',
    label:   'Bank Passbook',
    emoji:   '🏦',
    state:   'AWAIT_PASSBOOK',
    fields:  [
      { key: 'ocrName',    label: 'Account Holder', placeholder: 'Name on passbook' },
      { key: 'ocrAccount', label: 'Account No',     placeholder: 'Account number', redact: true },
      { key: 'ocrBank',    label: 'Bank Name',      placeholder: 'e.g. State Bank of India' },
      { key: 'ocrIfsc',    label: 'IFSC Code',      placeholder: 'e.g. SBIN0001234' },
    ],
  },
  {
    key:     'qr',
    label:   'UPI QR Code',
    emoji:   '📱',
    state:   'AWAIT_QR',
    fields:  [
      { key: 'ocrUpiId', label: 'UPI ID',      placeholder: 'e.g. name@okaxis' },
      { key: 'ocrPhone', label: 'Linked Phone', placeholder: '10-digit number' },
    ],
    skippable: true,
  },
];

function renderPhase2(area, bar, action) {
  const docs = vendor.data.docs || {};

  // Derive active doc from session state
  const stateToDoc = { AWAIT_AADHAAR: 0, AWAIT_PAN: 0, AWAIT_PASSBOOK: 1, AWAIT_QR: 2 };
  let activeIdx = stateToDoc[vendor.state] ?? 0;
  // If all docs present, show the first non-approved one
  DOC_DEFS.forEach((d, i) => {
    if (docs[d.key]?.agentApproved) return;
    if (docs[d.key] && !docs[d.key].agentApproved) activeIdx = i;
  });
  // If none pending, stay at last
  if (DOC_DEFS.every((d, i) => docs[d.key]?.agentApproved)) activeIdx = 2;

  area.innerHTML = `
    <!-- 3-step doc progress bar -->
    <div class="card" style="padding:10px 12px">
      <div style="display:flex;align-items:center;gap:0">
        ${DOC_DEFS.map((d, i) => {
          const docData = docs[d.key];
          const done    = docData?.agentApproved;
          const waiting = docData && !docData.agentApproved && docData.status !== 'retry';
          const retry   = docData?.status === 'retry';
          const active  = i === activeIdx;
          const bg   = done    ? 'var(--green)'
                     : retry   ? 'var(--red)'
                     : active  ? 'var(--green)'
                     : 'var(--border)';
          const col  = (done || active) ? '#fff' : retry ? '#fff' : 'var(--gray)';
          const icon = done ? '✓' : retry ? '!' : (i + 1);
          return `
            <div style="flex:1;text-align:center">
              <div style="width:24px;height:24px;border-radius:50%;margin:0 auto 3px;
                   display:flex;align-items:center;justify-content:center;
                   font-size:11px;font-weight:700;background:${bg};color:${col}">
                ${icon}
              </div>
              <div style="font-size:9px;color:${done ? 'var(--green)' : active ? 'var(--text)' : 'var(--text-2)'};font-weight:${active?700:400}">
                ${d.emoji} ${d.label.split(' ')[0]}
              </div>
            </div>
            ${i < 2 ? `<div style="flex:0 0 10px;height:2px;background:${done?'var(--green)':'var(--border)'};margin-bottom:14px"></div>` : ''}
          `;
        }).join('')}
      </div>
    </div>

    <!-- Doc cards: one per document -->
    ${DOC_DEFS.map((def, i) => renderDocCard(def, docs[def.key], i, activeIdx)).join('')}

    <!-- All approved summary -->
    ${DOC_DEFS.every(d => docs[d.key]?.agentApproved) ? `
    <div class="card card-green" style="text-align:center;padding:16px">
      <div style="font-size:24px;margin-bottom:6px">✅</div>
      <div style="font-size:13px;font-weight:700;color:var(--green)">All documents verified</div>
      <div style="font-size:11px;color:var(--text-2);margin-top:4px">Vendor has been notified. Proceeding to Video KYC.</div>
    </div>` : ''}
  `;
}

function renderDocCard(def, docData, idx, activeIdx) {
  const isActive   = idx === activeIdx;
  const isApproved = docData?.agentApproved;
  const isPending  = docData && !isApproved && docData.status !== 'retry';
  const isRetry    = docData?.status === 'retry';
  const isWaiting  = !docData;

  // Collapsed approved card
  if (isApproved) {
    return `
      <div class="card card-green" style="padding:10px 14px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px">${def.emoji}</span>
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--green)">${def.label}</div>
              <div style="font-size:11px;color:var(--text-2)">✅ Verified — vendor notified</div>
            </div>
          </div>
          <button class="btn btn-gray" style="font-size:11px;padding:4px 8px"
                  onclick="reopenDoc('${def.key}')">Edit</button>
        </div>
      </div>`;
  }

  // Waiting for vendor to send image
  if (isWaiting) {
    return `
      <div class="card" style="opacity:${isActive ? 1 : 0.45}">
        <div class="card-title">${def.emoji} ${def.label}</div>
        <div class="ocr-img" style="flex-direction:column;gap:6px">
          <span style="font-size:20px">📷</span>
          <span>Waiting for vendor to send photo...</span>
        </div>
        ${isActive ? `
          <div class="btn-row" style="margin-top:8px">
            <button class="btn btn-gray btn-full" onclick="nudgeVendor('${def.key}')">
              💬 Remind vendor to send photo
            </button>
          </div>
          ${def.skippable ? `<button class="btn btn-gray btn-full" style="margin-top:6px" onclick="agentSkipQR()">⏭️ Skip — no UPI QR</button>` : ''}
        ` : ''}
      </div>`;
  }

  // Image received — show OCR review panel
  const ocrRaw  = docData.ocrRaw || '';
  const ts      = docData.receivedAt ? new Date(docData.receivedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
  const cardClass = isRetry ? 'card card-amber' : 'card';

  return `
    <div class="${cardClass}" id="docCard-${def.key}">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>${def.emoji} ${def.label} ${isRetry ? '— retry requested' : '— review'}</span>
        ${ts ? `<span style="font-size:10px;color:var(--text-2);font-weight:400">${ts}</span>` : ''}
      </div>

      <!-- OCR raw preview strip -->
      ${ocrRaw ? `
        <div style="background:var(--gray-lt);border-radius:7px;padding:7px 10px;font-size:10px;
                    color:var(--text-2);margin-bottom:10px;max-height:52px;overflow:hidden;
                    line-height:1.5;font-family:monospace">
          ${ocrRaw.slice(0, 160).replace(/\n/g, ' · ')}...
        </div>` : `
        <div class="ocr-img">
          <span style="font-size:18px">📄</span>
          <span style="margin-top:4px">Image received — OCR unavailable</span>
        </div>`}

      <!-- Editable OCR fields -->
      <div id="ocrFields-${def.key}">
        ${def.fields.map(f => `
          <div class="ocr-field">
            <label>${f.label}</label>
            <input type="text" id="ocr-${def.key}-${f.key}"
                   value="${(docData[f.key] || '').replace(/"/g, '&quot;')}"
                   placeholder="${f.placeholder}"
                   style="${f.redact ? 'font-family:monospace;letter-spacing:1px' : ''}"/>
          </div>`).join('')}
      </div>

      <!-- Action buttons -->
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="btn btn-green" style="flex:1" onclick="approveDoc('${def.key}')">
          ✓ Approve &amp; notify vendor
        </button>
        <button class="btn btn-amber" style="flex:0 0 auto" onclick="retryDoc('${def.key}')">
          🔄 Retry
        </button>
      </div>
      ${def.skippable ? `
        <button class="btn btn-gray btn-full" style="margin-top:6px" onclick="agentSkipQR()">
          ⏭️ Skip — vendor has no UPI QR
        </button>` : ''}
    </div>`;

// ── Doc actions ────────────────────────────────────────────────────────────
async function approveDoc(docKey) {
  const def    = DOC_DEFS.find(d => d.key === docKey);
  if (!def) return;

  // Collect all edited field values
  const fields = {};
  def.fields.forEach(f => {
    const el = document.getElementById(`ocr-${docKey}-${f.key}`);
    if (el) fields[f.key] = el.value.trim();
  });

  const ok = await agentAction('approve_document', JSON.stringify({ docKey, fields }));
  if (ok) {
    toast(`${def.emoji} ${def.label} approved — vendor notified`);
    addLog(`Approved: ${def.label} — ${Object.values(fields).filter(Boolean).join(', ')}`);
    renderPhase(2);
  }
}

async function retryDoc(docKey) {
  const def = DOC_DEFS.find(d => d.key === docKey);
  if (!def) return;
  const ok = await agentAction('retry_document', docKey);
  if (ok) {
    toast('Vendor asked to resend ' + def.label);
    addLog('Retry requested: ' + def.label);
    renderPhase(2);
  }
}

async function nudgeVendor(docKey) {
  const def  = DOC_DEFS.find(d => d.key === docKey);
  if (!def) return;
  const ok = await agentAction('send_custom_message',
    'Please send a clear photo of your ' + def.label + '.\n\n' +
    'Tap the attachment icon, select Gallery or Camera, and send the photo.'
  );
  if (ok) { toast('Reminder sent to vendor'); addLog('Nudge sent: ' + def.label); }
}

async function reopenDoc(docKey) {
  // Reset approved flag so agent can re-edit
  // For now just re-render (the edit button shows it again)
  toast('You can re-edit by scrolling to that document', true);
}

async function agentSkipQR() {
  const ok = await agentAction('approve_document', JSON.stringify({
    docKey: 'qr', fields: { ocrUpiId: 'SKIPPED', ocrPhone: '' }
  }));
  if (ok) {
    toast('QR / UPI skipped');
    addLog('QR skipped by agent');
    renderPhase(2);
  }
}

async function saveRefs() {
  const r1n = document.getElementById('ref1Name')?.value.trim();
  const r1p = document.getElementById('ref1Phone')?.value.trim().replace(/\D/g,'');
  const r2n = document.getElementById('ref2Name')?.value.trim();
  const r2p = document.getElementById('ref2Phone')?.value.trim().replace(/\D/g,'');
  if (!r1n || !r1p || r1p.length !== 10) { toast('Enter Reference name and valid 10-digit number', false); return; }
  if (!r2n || !r2p || r2p.length !== 10) { toast('Enter Fallback Contact name and valid 10-digit number', false); return; }

  const refs = { ref1Name: r1n, ref1Phone: r1p, ref2Name: r2n, ref2Phone: r2p };
  const ok = await agentAction('save_references', JSON.stringify(refs));
  if (ok) {
    toast('References saved — financial check prompt sent');
    addLog('References: ' + r1n + ' / ' + r2n);
    renderPhase(3);
  }
}

function editRefs() { vendor.data.ref1Name = ''; vendor.data.ref2Name = ''; renderPhase(3); }
function editLoanAmount() { vendor.data.loanAmount = null; renderPhase(3); }

async function runFinancialCheck(choice) {
  const ok = await agentAction('financial_consent', choice);
  if (ok) {
    toast(choice === 'yes' ? 'Financial check running...' : 'Skipped — default eligibility applied');
    addLog('Financial check: ' + choice);

async function submitLoanAmount() {
  const amt = parseInt(document.getElementById('loanAmtInput')?.value || 0);

  if (amt < 5000 || amt > max) { toast('Amount must be ₹5,000 to ₹' + max.toLocaleString('en-IN'), false); return; }
  const ok = await agentAction('set_loan_amount', String(amt));
  if (ok) {
    toast('Loan amount sent: ₹' + amt.toLocaleString('en-IN'));
    addLog('Loan amount set: ₹' + amt.toLocaleString('en-IN'));
    renderPhase(3);
  }

  if (ok) {
    toast('Loan confirmed — sending KYC readiness check to vendor');
    addLog('Loan confirmed, KYC readiness check sent');
    switchPhase(4);

}

// ── Constants (per spec: ₹1.5L annual revenue, ₹30,000 max loan) ──────────
const ANNUAL_REV   = 150000; // ₹1.5L annual revenue per spec
const MAX_LOAN     = 30000;   // 20% of ₹1.5L = ₹30,000
const RATE         = 0.10;    // 10% p.a.
const INTEREST_RATE = RATE;   // alias for backward compat
const DAYS_PER_MONTH = 30;
const MONTHS_IN_YEAR = 12;   // 10% p.a.
const LOAN         = () => Math.min(vendor.data?.loanAmount || MAX_LOAN, MAX_LOAN);
const TOTAL_REPAY  = () => LOAN() + Math.round(LOAN() * RATE);

// ── Tab state ─────────────────────────────────────────────────────────────
let repayTab  = 'fixed';
let selMonths = [];          // indices 0-11 for Flexible EMI peak months

  const tranche = vendor.data?.eligibility?.trancheLabel || 'Tranche 1';

    ✓ Eligible: ₹${LOAN().toLocaleString('en-IN')} · Tranche ${tn} · 20% of ₹1.5L revenue
  </div>`;
}

                 cursor:pointer;border-bottom:${active?'2px solid var(--green)':'2px solid transparent'};
                 color:${active?'var(--green)':'var(--text-2)'};white-space:pre-line;line-height:1.3;
                 margin-bottom:-2px">${labels[i]}</div>`;
      }).join('')}
    </div>
    <div id="repayContent" style="margin-top:0">${renderRepayContent()}</div>
  `;
}

function setRepayTab(tab) {
  repayTab  = tab;
  selMonths = [];
  renderPhase(5);
}

function renderRepayContent() {
  if (repayTab === 'fixed')    return renderFixed();
  if (repayTab === 'seasonal') return renderSeasonal();
  if (repayTab === 'micro')    return renderMicro();
  return '';
}

// FIXED EMI — tenure slider → donut chart → breakdown

        <circle cx="44" cy="44" r="38" fill="none" stroke="var(--green)" stroke-width="10"
                stroke-dasharray="${prDash.toFixed(1)} ${inDash.toFixed(1)}"
                stroke-dashoffset="${circ * 0.25}" stroke-linecap="round"/>
        <circle cx="44" cy="44" r="38" fill="none" stroke="${interest>0?'#f59e0b':'transparent'}" stroke-width="10"
                stroke-dasharray="${inDash.toFixed(1)} ${prDash.toFixed(1)}"

let microCutoffDay = 20;  // selected auto-debit day

  // Micro EMI = perTwo00/200 * 411 ≈ round to nearest 10
  const avgDaily    = Math.round(ANNUAL_REV / 365);

  const sufficient  = (dailyAmt * totalDays) >= total;

    </button>

function buildCalendar(cutoff) {
  const days = ['M','T','W','T','F','S','S'];
  // Generate a generic 30-day month layout starting from Monday
  // (using a fixed layout so no real date dependency needed)
  const cells = [];
  // First row starts with 1 on Monday for simplicity
  let d = 1;
  const rows = [];
  // pad: first day is Monday (no offset needed)
  let rowCells = [];
  for (let i = 1; i <= 30; i++) {
    rowCells.push(i);
    if (rowCells.length === 7) { rows.push([...rowCells]); rowCells = []; }
  }
  if (rowCells.length) { while (rowCells.length < 7) rowCells.push(null); rows.push(rowCells); }

  const headerHTML = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
    ${days.map(d => `<div style="text-align:center;font-size:10px;font-weight:600;color:var(--text-2)">${d}</div>`).join('')}
  </div>`;

  const rowsHTML = rows.map(row =>
    `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">
      ${row.map(day => {
        if (!day) return `<div></div>`;
        const isAuto   = day === cutoff;
        const isBuffer = day > cutoff && day < 30;
        const isDue    = day === 30;
        let bg = '#fff', border = 'var(--border)', color = 'var(--text)';
        if (isAuto)   { bg = 'var(--green)';    border = 'var(--green)';   color = '#fff'; }
        else if (isDue)    { bg = 'var(--green-lt)'; border = '#c3e6d4';        color = 'var(--green)'; }
        else if (isBuffer) { bg = '#fef9c3';         border = '#fde68a';        color = '#92400e'; }
        return `<div onclick="setMicroCutoff(${day})"
                     style="text-align:center;padding:5px 0;border-radius:6px;font-size:11px;font-weight:${isAuto||isDue?700:400};
                            cursor:pointer;border:1.5px solid ${border};background:${bg};color:${color}">
                  ${day}
                </div>`;
      }).join('')}
    </div>`
  ).join('');

  return headerHTML + rowsHTML;
}

function setMicroCutoff(day) {
  if (day >= 30) return;  // 30 is always due date, not selectable
  microCutoffDay = day;
  document.getElementById('repayContent').innerHTML = renderMicro();
}

function updateMicroSlider(val) {
  const el = document.getElementById('microSliderVal');
  if (el) el.textContent = '₹' + val;
  document.getElementById('repayContent').innerHTML = renderMicro();
}

function updateMicroTenure(val) {
  const el = document.getElementById('microTenureVal');
  if (el) el.textContent = val + ' months';
  document.getElementById('repayContent').innerHTML = renderMicro();
}

async function confirmMicroPlan() {
  const perTwo00 = parseInt(document.getElementById('microSlider')?.value || 40);
  const tenure   = parseInt(document.getElementById('microTenure')?.value || 12);
  const avgDaily = Math.round(ANNUAL_REV / 365);

  const ok1 = await agentAction('select_micro');
  const ok2 = ok1 && await agentAction('submit_repayment_number', String(dailyAmt));
  const ok3 = ok2 && await agentAction('submit_repayment_number', String(tenure));
  if (ok3) {
    toast('Micro-repayment plan confirmed — sending to vendor');
    addLog('Micro: ₹' + dailyAmt + '/day · ' + tenure + 'mo · cutoff ' + microCutoffDay + 'th');
    switchPhase(6);
  }
}

  if (ok) {
    toast('Loan disbursed! Vendor notified on WhatsApp');
    addLog('Loan disbursed for +' + vendor.phone);
    // Show success state
    const area = document.getElementById('scrollArea');
    area.innerHTML += `
      <div class="card card-green" style="text-align:center;padding:24px">
        <div style="font-size:36px;margin-bottom:8px">🎉</div>
        <div style="font-size:16px;font-weight:700;color:var(--green)">Loan Approved & Disbursed!</div>
        <div style="font-size:12px;color:var(--text-2);margin-top:6px">
          Ref: SVAN-${Date.now().toString().slice(-8)}<br/>
          Vendor has received confirmation on WhatsApp.
        </div>
      </div>`;
  }
}

// ══════════════════════════════════════════════════════════════
// PHASE 6 — DISBURSAL
// Full checklist driven by real session data + Approve & Disburse
// ══════════════════════════════════════════════════════════════

function renderPhase6(area, bar, action) {
  const d    = vendor.data  || {};
  const docs = d.docs       || {};
  const kyc  = d.kyc        || {};
  const plan = d.repaymentPlan || {};

  // Each checklist item: label, done condition, detail string
  const steps = [
    {
      label:  'Identity verified (Aadhaar/Bank DB)',
      done:   !!(d.fetchedName),
      detail: d.fetchedName ? d.fetchedName : null,
    },
    {
      label:  'OTP verified',
      done:   !!(d.otpVerified),
      detail: d.phone ? d.phone.slice(0,2) + 'XXXXXX' + d.phone.slice(-2) : null,
    },
    {
      label:  'Data consent given',
      done:   !!(d.consentGiven),
      detail: d.dbPath ? (d.dbPath === 'aadhaar' ? 'Aadhaar DB' : 'Bank DB') : null,
    },
    {
      label:  'Aadhaar / Voter ID uploaded & OCR verified',
      done:   !!(docs.aadhaar?.agentApproved),
      detail: docs.aadhaar?.ocrName || null,
    },
    {
      label:  'Bank passbook uploaded & OCR verified',
      done:   !!(docs.passbook?.agentApproved),
      detail: docs.passbook?.ocrAccount ? 'A/C XXXX' + docs.passbook.ocrAccount.slice(-4) : null,
    },
    {
      label:  'UPI / QR code',
      done:   !!(docs.qr?.agentApproved || docs.qr?.status === 'skipped'),
      detail: docs.qr?.ocrUpiId !== 'SKIPPED' ? (docs.qr?.ocrUpiId || null) : 'Skipped',
    },
    {
      label:  'References collected',
      done:   !!(d.ref1Name && d.ref2Name),
      detail: d.ref1Name ? (d.ref1Name + ' / ' + (d.ref2Name || '—')) : null,
    },
    {
      label:  'Eligibility & loan amount confirmed',
      done:   !!(d.loanAmount),
      detail: d.loanAmount ? '₹' + d.loanAmount.toLocaleString('en-IN') : null,
    },
    {
      label:  'Video KYC completed',
      done:   !!(kyc.completed || kyc.agentApproved),
      detail: kyc.completedAt ? 'At ' + new Date(kyc.completedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : null,
    },
    {
      label:  'Repayment plan selected',
      done:   !!(plan.type),
      detail: plan.type === 'MONTHLY'  ? 'Fixed EMI · ' + plan.tenure + ' months'
            : plan.type === 'SEASONAL' ? 'Flexible EMI · ' + (plan.highMonths||0) + ' peak months'
            : plan.type === 'MICRO'    ? 'Micro · ₹' + (plan.dailyAmount||0) + '/day'
            : null,
    },
  ];

  const doneCount = steps.filter(s => s.done).length;
  const allDone   = doneCount === steps.length;
  const loanRef   = d.approval?.loanRef || 'Pending';
  const disburseD = d.approval?.disburseDate
    ? new Date(d.approval.disburseDate).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})
    : 'Next working day';
  const accMask   = docs.passbook?.ocrAccount
    ? 'XXXX' + docs.passbook.ocrAccount.slice(-4)
    : 'XXXX-' + Math.floor(1000 + Math.random() * 9000);

  area.innerHTML = `
    <!-- Progress counter -->
    <div class="card" style="padding:10px 14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:var(--text-2)">🏁 Disbursal checklist</span>
        <span style="font-size:12px;font-weight:700;color:${allDone?'var(--green)':'var(--amber)'}">
          ${doneCount}/${steps.length} complete
        </span>
      </div>
      <div style="height:6px;border-radius:3px;background:var(--border);overflow:hidden">
        <div style="height:100%;border-radius:3px;background:${allDone?'var(--green)':'var(--amber)'};
                    width:${Math.round(doneCount/steps.length*100)}%;transition:width .4s"></div>
      </div>
    </div>

    <!-- Checklist -->
    <div class="card" style="padding:8px 14px">
      ${steps.map(s => `
        <div class="checklist-item">
          <div class="check-icon ${s.done ? 'check-done' : 'check-pending'}">${s.done ? '✓' : '○'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;color:${s.done ? 'var(--text)' : 'var(--gray)'};font-weight:${s.done?500:400}">
              ${s.label}
            </div>
            ${s.done && s.detail ? `<div style="font-size:10px;color:var(--text-2);margin-top:1px">${s.detail}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>

    <!-- Loan details summary -->
    <div class="card">
      <div class="card-title">💸 Loan disbursement details</div>
      <div class="data-row">
        <span class="data-key">Vendor</span>
        <span class="data-val">+${vendor.phone || '—'}</span>
      </div>
      <div class="data-row">
        <span class="data-key">Loan amount</span>
        <span class="data-val" style="color:var(--green);font-weight:700;font-size:16px">
          ₹${(d.loanAmount || MAX_LOAN).toLocaleString('en-IN')}
        </span>
      </div>
      <div class="data-row">
        <span class="data-key">Reference no.</span>
        <span class="data-val" style="font-family:monospace;font-size:12px">${loanRef}</span>
      </div>
      <div class="data-row">
        <span class="data-key">Disbursement</span>
        <span class="data-val">${disburseD}</span>
      </div>
      <div class="data-row">
        <span class="data-key">To account</span>
        <span class="data-val redacted">${accMask}</span>
      </div>
      <div class="data-row">
        <span class="data-key">Repayment plan</span>
        <span class="data-val" style="font-size:11px">
          ${!plan.type ? '—'
          : plan.type === 'MONTHLY'  ? 'Fixed EMI — ' + (plan.emi||'—') + '/mo × ' + plan.tenure + 'mo'
          : plan.type === 'SEASONAL' ? 'Flexible — ' + plan.highMonths + ' peak / ' + (12-plan.highMonths) + ' lean months'
          : 'Micro — ₹' + plan.dailyAmount + '/day × ' + plan.tenure + ' months'}
        </span>
      </div>
    </div>

    <!-- Disburse button or blocked warning -->
    ${allDone ? `
      <button class="btn btn-green btn-full" id="disburseBtn"
              style="font-size:15px;padding:16px;margin-bottom:4px" onclick="approveDisbursement()">
        💸 Approve &amp; Disburse
      </button>
      <p style="font-size:10px;color:var(--text-2);text-align:center;margin-bottom:16px">
        This will send final confirmation to vendor and trigger bank transfer.
      </p>
    ` : `
      <div class="card card-amber">
        <div style="font-size:12px;color:#92400e;display:flex;align-items:center;gap:8px">
          ⚠️
          <span>${steps.length - doneCount} step${steps.length-doneCount>1?'s':''} remaining before disbursement.</span>
        </div>
      </div>
    `}
  `;
}

async function approveDisbursement() {
  const btn = document.getElementById('disburseBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Processing...'; }
  const ok = await agentAction('proceed_plan');
  if (ok) {
    toast('Loan disbursed! Vendor notified on WhatsApp');
    addLog('Loan disbursed for +' + vendor.phone);
    const ref = vendor.data?.approval?.loanRef || 'SVAN-' + Date.now().toString().slice(-8);
    const area = document.getElementById('scrollArea');
    area.innerHTML = `
      <div class="card card-green" style="text-align:center;padding:32px 24px;margin-top:16px">
        <div style="font-size:48px;margin-bottom:12px">🎉</div>
        <div style="font-size:18px;font-weight:700;color:var(--green);margin-bottom:4px">
          Loan Approved &amp; Disbursed!
        </div>
        <div style="font-size:13px;color:var(--text-2);margin-top:8px;line-height:1.6">
          Ref: <strong>${ref}</strong><br/>
          Amount: <strong>₹${(vendor.data?.loanAmount || MAX_LOAN).toLocaleString('en-IN')}</strong><br/>
          Vendor has received confirmation on WhatsApp.
        </div>
      </div>`;
  }
}


// ══════════════════════════════════════════════════════════════
// LIVE SYNC — polls vendor session every 4s and auto-updates UI
// ══════════════════════════════════════════════════════════════

// Maps each WhatsApp bot STATE to the correct dashboard tab index
const STATE_TO_PHASE = {
  IDLE: 0, ONBOARDING: 0,
  COLLECT_PHONE: 1, COLLECT_UPI: 1, CONSENT_GATE: 1, ELIGIBILITY_RESULT: 1,
  AWAIT_AADHAAR: 2, AWAIT_PAN: 2, AWAIT_PASSBOOK: 2, AWAIT_QR: 2,
  PROFILING_REFS: 3, PROFILING_FINANCE: 3, LOAN_SELECTION: 3,
  KYC_READINESS: 4,
  VIDEO_KYC: 4, AWAITING_APPROVAL: 4,
  REPAYMENT_MENU: 5, MONTHLY_EMI: 5, MONTHLY_CONFIRM: 5,
  SEASONAL_HIGH: 5, SEASONAL_LOW: 5, SEASONAL_CONFIRM: 5,
  MICRO_DAILY: 5, MICRO_TENURE: 5, MICRO_CONFIRM: 5,
  FINALIZED: 6,
};

let pollTimer      = null;
let lastSyncTime   = null;
let syncFailing    = false;

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(syncVendorState, 4000);
  document.getElementById('syncBadge').style.display = 'inline-flex';
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  document.getElementById('syncBadge').style.display = 'none';
}

async function syncVendorState() {
  if (!vendor.phone) return;
  try {
    const sep = '/agent/session/' + vendor.phone;
    const res = await fetch(sep + '?pass=' + PASS);
    const data = await res.json();
    
    const newState = data.state || 'IDLE';
    const newData  = data.data  || {};
    
    // Update sync indicator
    lastSyncTime = Date.now();
    syncFailing  = false;
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    if (dot) { dot.classList.remove('stale'); }
    if (lbl) { lbl.textContent = 'Live'; }
    
    // If state changed, update UI
    if (newState !== vendor.state) {
      const prevState = vendor.state;
      vendor.state = newState;
      vendor.data  = newData;
      updateVendorStrip();
      addLog('State changed: ' + prevState + ' → ' + newState);
      
      // Auto-switch to the correct tab for new state
      const targetPhase = STATE_TO_PHASE[newState];
      if (targetPhase !== undefined && targetPhase !== currentPhase) {
        // Only auto-switch if agent is not on a later phase (don't pull them backwards unless finalized)
        const shouldSwitch = targetPhase > currentPhase || newState === 'FINALIZED';
        if (shouldSwitch) {
          currentPhase = targetPhase;
          document.querySelectorAll('.phase-tab').forEach((t, i) => {
            t.classList.toggle('active', i === targetPhase);
          });
          renderPhase(targetPhase);
          toast('Vendor moved to: ' + (STATE_LABELS[newState] || newState), true);
        }
      } else if (targetPhase === currentPhase) {
        // Same tab but state changed — re-render to reflect new sub-state
        vendor.data = newData;
        renderPhase(currentPhase);
      }
    } else {
      // State same — still update data in case documents were uploaded etc.
      vendor.data = newData;
    }
  } catch (e) {
    syncFailing = true;
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    if (dot) { dot.classList.add('stale'); }
    if (lbl) { lbl.textContent = 'Offline'; }
  }
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
// Auto-login if pass param is in URL — skip login screen entirely
const autoPass = new URLSearchParams(location.search).get('pass');
if (autoPass) {
  document.getElementById('agentPass').value = autoPass;
  document.getElementById('agentPhone').value = '0000000000';
  agentLogin();
}
</script>
