<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>PM SVANidhi — Agent Dashboard</title>
<style>
:root{
  --green:#1a6e3c;--green-mid:#2d9e5f;--green-lt:#e8f5ee;--green-pale:#f4fbf7;
  --amber:#f59e0b;--amber-lt:#fef9ec;--red:#dc2626;--red-lt:#fef2f2;
  --blue:#2563eb;--gray:#6b7280;--gray-lt:#f9fafb;--border:#e5e7eb;
  --text:#111827;--text-2:#6b7280;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#d0d4d0;
  color:var(--text);font-size:13px;
  margin:0;padding:0;
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;
}

/* ── Phone frame — fixed 300x800, everything lives inside ── */
#phoneFrame{
  width:300px;
  height:800px;
  overflow:hidden;
  position:relative;
  background:#f0f2f0;
  box-shadow:0 8px 40px rgba(0,0,0,.35);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}

/* ── Login ── */
#loginScreen{
  height:800px;width:300px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg,#0f4025 0%,#1a6e3c 60%,#2d9e5f 100%);
  flex-shrink:0;
}
.login-logo{font-size:40px;margin-bottom:8px;text-align:center}
.login-title{color:#fff;font-size:20px;font-weight:700;margin-bottom:2px;text-align:center}
.login-sub{color:rgba(255,255,255,.7);font-size:12px;margin-bottom:28px;text-align:center}
.login-card{background:#fff;border-radius:14px;padding:20px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.login-card label{display:block;font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.login-card input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;margin-bottom:14px}
.login-card input:focus{border-color:var(--green-mid)}
.btn-login{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

/* ── App shell ── */
#appShell{
  display:none;flex-direction:column;
  height:800px;width:300px;overflow:hidden;position:relative;
}

/* ── Top bar ── */
.topbar{
  background:var(--green);color:#fff;padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-logo{font-size:18px}
.topbar-title{font-size:13px;font-weight:700;line-height:1.2}
.topbar-sub{font-size:10px;opacity:.75}
.topbar-right{display:flex;align-items:center;gap:5px}
#syncBadge{display:none;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 7px;font-size:10px;font-weight:500;color:#fff}
#syncDot{width:6px;height:6px;border-radius:50%;background:#86efac;animation:syncpulse 2s infinite}
#syncDot.stale{background:#fca5a5;animation:none}
@keyframes syncpulse{0%,100%{opacity:1}50%{opacity:.4}}
#refreshBtn{display:none;background:rgba(255,255,255,.15);border:none;border-radius:20px;color:#fff;font-size:10px;padding:2px 8px;cursor:pointer}

/* ── Progress bar ── */
.progress-wrap{background:#fff;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.progress-label{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px;font-weight:600;color:var(--text-2)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.step-title{font-size:12px;font-weight:700;color:var(--green);margin-top:3px}

/* ── Vendor strip ── */
.vendor-strip{
  background:#fff;padding:8px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.vendor-phone{font-size:12px;font-weight:700}
.vendor-state{font-size:10px;color:var(--text-2)}
.vendor-input-row{display:flex;gap:6px;align-items:center}
.vendor-input-row input{flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;outline:none}
.vendor-input-row input:focus{border-color:var(--green-mid)}

/* ── Scroll area ── */
.scroll-area{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:10px 12px 80px 12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  -webkit-overflow-scrolling:touch;
}

/* ── Cards ── */
.card{background:#fff;border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)}
.card-green{border:1.5px solid var(--green-lt);background:var(--green-pale)}
.card-amber{border:1.5px solid #fde68a;background:var(--amber-lt)}
.card-title{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px}

/* ── Data rows ── */
.data-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.data-row:last-child{border-bottom:none}
.data-key{color:var(--text-2);font-size:10px}
.data-val{font-weight:600;font-size:11px;text-align:right}
.redacted{font-family:monospace;letter-spacing:1px}

/* ── Buttons ── */
.btn{padding:9px 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-green{background:var(--green);color:#fff}
.btn-gray{background:var(--gray-lt);color:var(--text);border:1px solid var(--border)}
.btn-amber{background:var(--amber);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-full{width:100%;display:block;text-align:center}
.btn-row{display:flex;gap:6px;margin-top:8px}
.btn-row .btn{flex:1}

/* ── Form fields ── */
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--text-2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.field input,.field select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;outline:none}
.field input:focus{border-color:var(--green-mid)}
.field-note{font-size:10px;color:var(--text-2);margin-top:3px}

/* ── OTP row ── */
.otp-row{display:flex;gap:8px;justify-content:center;margin:10px 0}
.otp-row input{width:44px;height:44px;text-align:center;font-size:18px;font-weight:700;border:2px solid var(--border);border-radius:8px;outline:none}
.otp-row input:focus{border-color:var(--green)}

/* ── OCR fields ── */
.ocr-field{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.ocr-field label{font-size:10px;color:var(--text-2);white-space:nowrap;min-width:70px}
.ocr-field input{flex:1;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;outline:none}
.ocr-field input:focus{border-color:var(--green-mid)}

/* ── Checklist ── */
.check-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
.check-item:last-child{border-bottom:none}
.check-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px}
.check-done{background:var(--green);color:#fff}
.check-pending{background:var(--border);color:var(--gray)}

/* ── Month grid ── */
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:8px}
.month-btn{padding:6px 2px;text-align:center;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text)}
.month-btn.selected{background:var(--green);color:#fff;border-color:var(--green)}

/* ── Slider ── */
.slider-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:11px}
.slider-label .val{font-weight:700;color:var(--green);font-size:13px}
input[type=range]{width:100%;accent-color:var(--green);height:4px}

/* ── EMI result card ── */
.emi-result{background:var(--green);color:#fff;border-radius:var(--radius);padding:12px;margin:8px 0}
.emi-result-label{font-size:10px;opacity:.8;margin-bottom:2px}
.emi-result-val{font-size:22px;font-weight:700}
.emi-result-sub{font-size:10px;opacity:.7}

/* ── Info pill ── */
.info-pill{display:flex;align-items:center;gap:5px;background:var(--green-lt);border-radius:20px;padding:5px 10px;font-size:10px;font-weight:600;color:var(--green)}

/* ── Nav buttons (bottom) ── */
#pageNav{
  width:300px;background:#fff;border-top:1px solid var(--border);
  padding:8px 12px;display:none;gap:8px;z-index:200;
  flex-shrink:0;
}
#pageNav .btn{flex:1;padding:10px}

/* ── Agent chat bar ── */
#agentChatBar{
  width:300px;background:#fff;border-top:1.5px solid var(--border);
  padding:7px 10px;display:none;z-index:201;flex-shrink:0;
}
#agentChatBar .inner{display:flex;gap:6px;align-items:center}
#agentChatBar input{flex:1;padding:7px 11px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;outline:none}
#agentChatBar input:focus{border-color:var(--green-mid)}
#agentChatBar button{background:var(--green);border:none;border-radius:50%;width:32px;height:32px;color:#fff;font-size:14px;cursor:pointer;flex-shrink:0}

/* ── Toast ── */
#toast{
  position:absolute;bottom:75px;left:50%;transform:translateX(-50%);
  background:#1a6e3c;color:#fff;padding:8px 16px;border-radius:20px;
  font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;z-index:300;
  white-space:nowrap;max-width:275px;text-align:center;pointer-events:none;
}

/* ── Repay tabs ── */
.repay-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:0}
.repay-tab{flex:1;text-align:center;padding:8px 2px;font-size:10px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-2);margin-bottom:-2px;white-space:pre-line;line-height:1.3}
.repay-tab.active{border-bottom-color:var(--green);color:var(--green)}

/* ── Log ── */
.log-strip{background:var(--gray-lt);border-radius:7px;padding:7px 9px;font-size:10px;color:var(--text-2);max-height:70px;overflow-y:auto}
.log-entry{margin-bottom:2px}
.log-time{color:var(--green);margin-right:4px}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="phoneFrame">

<!-- ══ LOGIN ════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-logo">🏛️</div>
  <div class="login-title">PM SVANidhi</div>
  <div class="login-sub">Agent Dashboard</div>
  <div class="login-card">
    <label>Agent Phone Number</label>
    <input type="tel" id="agentPhone" placeholder="8800446121" maxlength="10"/>
    <label>Password</label>
    <input type="password" id="agentPass" placeholder="••••••••"
           onkeydown="if(event.key==='Enter')agentLogin()"/>
    <button class="btn-login" onclick="agentLogin()">Login →</button>
  </div>
</div>

<!-- ══ APP SHELL ══════════════════════════════════════════════ -->
<div id="appShell">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🏛️</span>
      <div>
        <div class="topbar-title">PM SVANidhi</div>
        <div class="topbar-sub">Agent Console</div>
      </div>
    </div>
    <div class="topbar-right">
      <span id="agentBadge" style="background:rgba(255,255,255,.2);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:500;color:#fff">Agent</span>
      <span id="syncBadge"><span id="syncDot"></span><span id="syncLabel">Live</span></span>
      <button id="refreshBtn" onclick="manualRefresh()">↺</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="stepLabel">Step 1 of 11</span>
      <span id="stepName" style="color:var(--green);font-weight:700">Landing</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:9%"></div></div>
  </div>

  <!-- Vendor strip -->
  <div class="vendor-strip" id="vendorStrip">
    <div>
      <div class="vendor-phone" id="vendorNumDisplay">No vendor loaded</div>
      <div class="vendor-state" id="vendorStateDisplay">—</div>
    </div>
    <div class="vendor-input-row">
      <input type="tel" id="vendorPhoneInput" placeholder="91XXXXXXXXXX" style="width:110px"/>
      <button class="btn btn-green" style="padding:5px 10px;font-size:11px" onclick="loadVendor()">Load</button>
    </div>
  </div>

  <!-- Scroll area -->
  <div class="scroll-area" id="scrollArea">
    <div class="card" style="text-align:center;padding:24px 12px;color:var(--text-2)">
      <div style="font-size:28px;margin-bottom:6px">📋</div>
      <div style="font-size:12px">Load a vendor to begin</div>
    </div>
  </div>

  <!-- Page nav -->
  <div id="pageNav">
    <button class="btn btn-gray" id="btnBack" onclick="goBack()">← Back</button>
    <button class="btn btn-green" id="btnNext" onclick="goNext()">Next →</button>
  </div>

  <!-- Agent chat -->
  <div id="agentChatBar">
    <div class="inner">
      <input type="text" id="agentMsgInput" placeholder="Type a message to vendor..."
             onkeydown="if(event.key==='Enter')sendAgentMessage()"/>
      <button onclick="sendAgentMessage()">↑</button>
    </div>
  </div>

</div>

<div id="toast"></div>

</div><!-- end #phoneFrame -->

<script>
// ══════════════════════════════════════════════════════════════
// CONSTANTS & STATE
// ══════════════════════════════════════════════════════════════
const PASS = (new URLSearchParams(location.search).get('pass')) || 'svanidhi';
const ANNUAL_REV = 150000;
const MAX_LOAN   = 30000;
const RATE       = 0.10;
const LOAN       = () => Math.min(vendor.data?.loanAmount || MAX_LOAN, MAX_LOAN);

let agentNum     = '';
let vendor       = { phone: null, state: 'IDLE', data: {} };
let currentPage  = 1;   // 1-11
let pollTimer    = null;
let p1Step       = 'phone';
let selMonths    = [];
let microCutoffDay = 20;
let repayTab     = 'fixed';
let logEntries   = [];

const PAGES = [
  { n:1,  title:'Landing',          step:'1 of 11' },
  { n:2,  title:'Phone & OTP',      step:'2 of 11' },
  { n:3,  title:'Data Consent',     step:'3 of 11' },
  { n:4,  title:'Data Extraction',  step:'4 of 11' },
  { n:5,  title:'Documents',        step:'5 of 11' },
  { n:6,  title:'References',       step:'6 of 11' },
  { n:7,  title:'Financial Check',  step:'7 of 11' },
  { n:8,  title:'Loan Eligibility', step:'8 of 11' },
  { n:9,  title:'KYC Video',        step:'9 of 11' },
  { n:10, title:'Repayment',        step:'10 of 11'},
  { n:11, title:'Disbursal',        step:'11 of 11'},
];

const STATE_LABELS = {
  IDLE:'Not started',ONBOARDING:'Onboarding',COLLECT_PHONE:'Awaiting phone',
  CONSENT_GATE:'Consent gate',ELIGIBILITY_RESULT:'Details fetched',
  AWAIT_AADHAAR:'Awaiting OVD',AWAIT_QR:'Awaiting QR',
  PROFILING_REFS:'Collecting refs',PROFILING_FINANCE:'Financial consent',
  LOAN_SELECTION:'Loan selection',KYC_READINESS:'KYC readiness',
  AWAIT_KYC_VIDEO:'Awaiting video',VIDEO_KYC:'KYC in progress',
  AWAITING_APPROVAL:'Awaiting approval',REPAYMENT_MENU:'Repayment menu',
  MONTHLY_EMI:'Monthly EMI',SEASONAL_HIGH:'Seasonal high',
  MICRO_DAILY:'Micro daily',FINALIZED:'Complete',
};

const STATE_TO_PAGE = {
  IDLE:1,ONBOARDING:1,
  COLLECT_PHONE:2,
  CONSENT_GATE:3,
  ELIGIBILITY_RESULT:4,
  AWAIT_AADHAAR:5,AWAIT_PAN:5,AWAIT_QR:5,
  PROFILING_REFS:6,
  PROFILING_FINANCE:7,
  LOAN_SELECTION:8,
  KYC_READINESS:9,AWAIT_KYC_VIDEO:9,VIDEO_KYC:9,AWAITING_APPROVAL:9,
  REPAYMENT_MENU:10,MONTHLY_EMI:10,SEASONAL_HIGH:10,MICRO_DAILY:10,
  MONTHLY_CONFIRM:10,SEASONAL_CONFIRM:10,MICRO_CONFIRM:10,
  FINALIZED:11,
};

// ── Helpers ───────────────────────────────────────────────────
const logEntryEl = () => document.getElementById('logBox');

function addLog(msg) {
  const t = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  logEntries.unshift({t,msg});
  if (logEntries.length > 15) logEntries.pop();
}

function toast(msg, ok=true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = ok ? '#1a6e3c' : '#dc2626';
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2500);
}

async function api(path, opts={}) {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(path + sep + 'pass=' + PASS, opts);
  return res.json();
}

async function agentAction(action, value='') {
  if (!vendor.phone) { toast('Load a vendor first', false); return null; }
  addLog('→ ' + action + (value ? ' [' + String(value).slice(0,20) + ']' : ''));
  try {
    const data = await api('/agent/action', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ vendorPhone: vendor.phone, action, value }),
    });
    if (!data.ok) { toast(data.error || 'Action failed', false); return null; }
    try {
      const sess = await fetch('/agent/session/' + vendor.phone + '?pass=' + PASS);
      const sd   = await sess.json();
      vendor.state = sd.state || data.newState || vendor.state;
      vendor.data  = sd.data  || vendor.data;
    } catch(_) { vendor.state = data.newState || vendor.state; }
    updateStrip();
    toast('Done');
    return data;
  } catch(e) { toast('Network error', false); return null; }
}

// ── Login ─────────────────────────────────────────────────────
function agentLogin() {
  const phone = document.getElementById('agentPhone').value.trim() || '0000000000';
  const pass  = document.getElementById('agentPass').value.trim();
  if (!pass) { alert('Enter your password'); return; }
  agentNum = phone;
  document.getElementById('agentBadge').textContent = '+91 ' + phone.slice(-10);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  addLog('Agent logged in');
  goToPage(1);
}

// ── Vendor load ───────────────────────────────────────────────
async function loadVendor() {
  let raw = document.getElementById('vendorPhoneInput').value.trim().replace(/\D/g,'');
  if (raw.length === 10) raw = '91' + raw;
  if (!raw) { toast('Enter vendor phone number', false); return; }
  try {
    const data = await api('/agent/session/' + raw);
    vendor.phone = raw;
    vendor.state = data.state || 'IDLE';
    vendor.data  = data.data  || {};
    updateStrip();
    addLog('Loaded vendor +' + raw);
    const targetPage = STATE_TO_PAGE[vendor.state] || 1;
    startPolling();
    document.getElementById('agentChatBar').style.display = 'block';
    document.getElementById('pageNav').style.display = 'flex';
    goToPage(targetPage);
    toast('Vendor loaded — live sync on');
  } catch(e) { toast('Could not load vendor', false); }
}

function updateStrip() {
  document.getElementById('vendorNumDisplay').textContent = vendor.phone ? '+' + vendor.phone : 'No vendor loaded';
  document.getElementById('vendorStateDisplay').textContent = STATE_LABELS[vendor.state] || vendor.state;
}

// ── Navigation ────────────────────────────────────────────────
function goToPage(n) {
  currentPage = Math.max(1, Math.min(11, n));
  const p = PAGES[currentPage - 1];
  document.getElementById('stepLabel').textContent = 'Step ' + p.step;
  document.getElementById('stepName').textContent  = p.title;
  document.getElementById('progressFill').style.width = Math.round(currentPage / 11 * 100) + '%';
  document.getElementById('btnBack').style.display = currentPage === 1 ? 'none' : '';
  renderPage(currentPage);
  document.getElementById('scrollArea').scrollTop = 0;
}

function goNext() { goToPage(currentPage + 1); }
function goBack() { goToPage(currentPage - 1); }

function renderPage(n) {
  const area = document.getElementById('scrollArea');
  area.innerHTML = '';
  const fns = [null,p1,p2,p3,p4,p5,p6,p7,p8,p9,p10,p11];
  if (fns[n]) fns[n](area);
}

// ── Live sync ─────────────────────────────────────────────────
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(syncState, 4000);
  document.getElementById('syncBadge').style.display = 'inline-flex';
  document.getElementById('refreshBtn').style.display = 'inline-block';
}

async function syncState() {
  if (!vendor.phone) return;
  try {
    const res  = await fetch('/agent/session/' + vendor.phone + '?pass=' + PASS);
    const data = await res.json();
    const newState = data.state || 'IDLE';
    if (newState !== vendor.state) {
      const prev = vendor.state;
      vendor.state = newState;
      vendor.data  = data.data || {};
      updateStrip();
      addLog('State: ' + prev + ' → ' + newState);
      const tp = STATE_TO_PAGE[newState];
      if (tp && tp > currentPage) { goToPage(tp); toast('Vendor advanced to step ' + tp); }
      else renderPage(currentPage);
    } else {
      vendor.data = data.data || vendor.data;
    }
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    if (dot) dot.classList.remove('stale');
    if (lbl) lbl.textContent = 'Live';
  } catch(e) {
    const dot = document.getElementById('syncDot');
    if (dot) dot.classList.add('stale');
    document.getElementById('syncLabel').textContent = 'Offline';
  }
}

  if (docData?.agentApproved) {
    return `

            </div>
          </div>
        </div>
      </div>`;
  }
  if (!docData) {
    return `
      <div class="card">
        <div class="card-title">${def.emoji} ${def.label}</div>
        ${def.sublabel ? `<div style="font-size:10px;color:var(--text-2);margin-bottom:8px">${def.sublabel}</div>` : ''}

          💬 Remind vendor to send photo
        </button>
      </div>`;
  }
  // Has doc — show review
  const ts = docData.receivedAt ? new Date(docData.receivedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
  return `
    <div class="card ${docData.status==='retry'?'card-amber':''}">
      <div class="card-title" style="justify-content:space-between">
        <span>${def.emoji} ${def.label} — review</span>
        ${ts ? `<span style="font-size:10px;color:var(--text-2);font-weight:400">${ts}</span>` : ''}
      </div>
      <!-- Approve/Retry at top so always visible -->
      <div class="btn-row" style="margin-bottom:10px">
        <button class="btn btn-green" onclick="doApproveDoc('${def.key}')">✓ Approve &amp; notify</button>
        <button class="btn btn-amber" onclick="doRetryDoc('${def.key}')">🔄 Retry</button>
      </div>
      <!-- Editable OCR fields -->
      ${def.fields.map(f => `
        <div class="ocr-field">
          <label>${f.label}</label>
          <input type="text" id="ocr-${def.key}-${f.key}"
                 value="${(docData[f.key]||'').replace(/"/g,'&quot;')}"
                 placeholder="${f.placeholder}"
                 style="${f.redact?'font-family:monospace;letter-spacing:1px':''}"/>
        </div>`).join('')}
      ${docData.ocrRaw ? `
        <details style="margin-top:6px">
          <summary style="font-size:10px;color:var(--text-2);cursor:pointer">View raw OCR</summary>
          <div style="background:var(--gray-lt);border-radius:6px;padding:5px 7px;font-size:9px;color:var(--text-2);margin-top:4px;font-family:monospace;max-height:60px;overflow-y:auto;word-break:break-all">
            ${docData.ocrRaw.slice(0,200).replace(/\n/g,' · ')}
          </div>
        </details>` : ''}
    </div>`;
}

async function doApproveDoc(docKey) {
  const def = DOC_DEFS.find(d=>d.key===docKey);

  const fields = {};
  def.fields.forEach(f => { const el=document.getElementById(`ocr-${docKey}-${f.key}`); if(el) fields[f.key]=el.value.trim(); });
  const ok = await agentAction('approve_document', JSON.stringify({docKey, fields}));
  if (ok) { toast(def.emoji+' '+def.label+' approved'); addLog('Approved: '+def.label); renderPage(5); }
}
async function doRetryDoc(docKey) {
  const def = DOC_DEFS.find(d=>d.key===docKey);

  if (ok) { toast('Retry requested: '+(def?.label||docKey)); renderPage(5); }

function repayMicro5() {
  const loan=LOAN(),interest=Math.round(loan*RATE),total=loan+interest;
  const perTwo00=parseInt(document.getElementById('microSlider5')?.value||40);
  const tenure=parseInt(document.getElementById('microTenure5')?.value||12);
  const cutoff=microCutoffDay;
  const avgDaily=Math.round(ANNUAL_REV/365);
  const dailyAmt=Math.max(1,Math.round((perTwo00/200)*avgDaily/5)*5);
  const monthlyEMI=Math.ceil(total/tenure);
  const autoCovers=dailyAmt*cutoff;
  const remaining=Math.max(monthlyEMI-autoCovers,0);
  const bufferDays=30-cutoff;
  // Calendar
  const days=['M','T','W','T','F','S','S'];
  const rows=[];let row=[];
  for(let i=1;i<=30;i++){row.push(i);if(row.length===7){rows.push([...row]);row=[];}}
  if(row.length){while(row.length<7)row.push(null);rows.push(row);}
  const calHTML=`
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px">
      ${days.map(d=>`<div style="text-align:center;font-size:9px;font-weight:600;color:var(--text-2)">${d}</div>`).join('')}

    ${rows.map(row=>`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px">
      ${row.map(day=>{
        if(!day) return '<div></div>';
        const isAuto=day===cutoff,isBuffer=day>cutoff&&day<30,isDue=day===30;
        let bg='#fff',border='var(--border)',col='var(--text)';
        if(isAuto){bg='var(--green)';border='var(--green)';col='#fff';}
        else if(isDue){bg='var(--green-lt)';border='#c3e6d4';col='var(--green)';}
        else if(isBuffer){bg='#fef9c3';border='#fde68a';col='#92400e';}
        return `<div onclick="setMicroCutoff5(${day})" style="text-align:center;padding:4px 0;border-radius:5px;font-size:10px;font-weight:${isAuto||isDue?700:400};cursor:pointer;border:1px solid ${border};background:${bg};color:${col}">${day}</div>`;
      }).join('')}
    </div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text-2)"><div style="width:8px;height:8px;border-radius:2px;background:var(--green)"></div>Auto-debit</div>
      <div style="display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text-2)"><div style="width:8px;height:8px;border-radius:2px;background:#fef9c3;border:1px solid #fde68a"></div>Buffer</div>
      <div style="display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text-2)"><div style="width:8px;height:8px;border-radius:2px;background:var(--green-lt);border:1px solid #c3e6d4"></div>Due date</div>
    </div>`;
  return `
    <div class="card" style="margin-top:6px">
      <div class="slider-label"><span>Savings per ₹200 earned</span><span class="val" id="microSliderVal5">₹${perTwo00}</span></div>
      <input type="range" id="microSlider5" min="10" max="100" value="${perTwo00}" step="5" oninput="updateMicroSlider5(this.value)"/>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-2)"><span>₹10</span><span>₹100</span></div>
    </div>
    <div class="card">
      <div class="slider-label"><span>Repayment tenure</span><span class="val" id="microTenureVal5">${tenure} months</span></div>
      <input type="range" id="microTenure5" min="6" max="12" value="${tenure}" step="1" oninput="updateMicroTenure5(this.value)"/>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-2)"><span>6 mo</span><span>12 mo</span></div>
    </div>
    <div class="card">
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <span style="background:var(--green);color:#fff;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600">Auto-debit by ${cutoff}th</span>
        <span style="background:var(--amber-lt);color:#92400e;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600">Due date: 30th</span>
      </div>
      ${calHTML}
    </div>
    <div class="emi-result">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div><div class="emi-result-label">Monthly EMI</div><div class="emi-result-val">₹${monthlyEMI.toLocaleString('en-IN')}</div><div class="emi-result-sub">total per month</div></div>
        <div style="text-align:right"><div class="emi-result-label">Auto-debit covers</div><div style="font-size:18px;font-weight:700">₹${autoCovers.toLocaleString('en-IN')}</div><div class="emi-result-sub">by ${cutoff}th</div></div>
      </div>
      <div style="border-top:1px solid rgba(255,255,255,.2);padding-top:7px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;opacity:.8">Remaining (pay by 30th)</span><span style="font-size:11px;font-weight:600">₹${remaining.toLocaleString('en-IN')}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;opacity:.8">Buffer window</span><span style="font-size:11px;font-weight:600">${bufferDays} days</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;opacity:.8">Total interest (10% p.a.)</span><span style="font-size:11px;font-weight:600">₹${interest.toLocaleString('en-IN')}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:10px;opacity:.8">Total payable</span><span style="font-size:12px;font-weight:700">₹${total.toLocaleString('en-IN')}</span></div>
      </div>
    </div>
    <button class="btn btn-green btn-full" onclick="doConfirmMicro5()">Set up Micro-Repayment →</button>`;
}
function setMicroCutoff5(day){if(day>=30)return;microCutoffDay=day;document.getElementById('repayContent').innerHTML=renderRepay5();}
function updateMicroSlider5(val){const el=document.getElementById('microSliderVal5');if(el)el.textContent='₹'+val;document.getElementById('repayContent').innerHTML=renderRepay5();}
function updateMicroTenure5(val){const el=document.getElementById('microTenureVal5');if(el)el.textContent=val+' months';document.getElementById('repayContent').innerHTML=renderRepay5();}
async function doConfirmMicro5(){
  const p=parseInt(document.getElementById('microSlider5')?.value||40);
  const t=parseInt(document.getElementById('microTenure5')?.value||12);
  const avg=Math.round(ANNUAL_REV/365);
  const daily=Math.max(1,Math.round((p/200)*avg/5)*5);
  const ok1=await agentAction('select_micro');
  const ok2=ok1&&await agentAction('submit_repayment_number',String(daily));
  const ok3=ok2&&await agentAction('submit_repayment_number',String(t));
  if(ok3){toast('Micro-repayment confirmed');addLog('Micro: ₹'+daily+'/day · '+t+'mo · cutoff '+microCutoffDay+'th');goToPage(11);}
}

// ══════════════════════════════════════════════════════════════
// PAGE 11 — FINAL CHECKLIST & DISBURSAL
// ══════════════════════════════════════════════════════════════
function p11(area) {
  const d=vendor.data||{},docs=d.docs||{},kyc=d.kyc||{},plan=d.repaymentPlan||{};
  const steps=[
    {label:'Identity verified (Bank DB)',         done:!!d.fetchedName,         detail:d.fetchedName||null},
    {label:'OTP verified',                        done:!!d.otpVerified,          detail:d.phone?d.phone.slice(0,2)+'XXXXXX'+d.phone.slice(-2):null},
    {label:'Data consent given',                  done:!!d.consentGiven,         detail:'Bank DB'},
    {label:'Identity document (OVD) verified',   done:!!docs.ovd?.agentApproved,detail:docs.ovd?.docTypeLabel||(docs.ovd?.ocrName||null)},
    {label:'UPI QR code verified',                done:!!docs.qr?.agentApproved, detail:docs.qr?.ocrUpiId||null},
    {label:'References collected',                done:!!(d.ref1Name&&d.ref2Name),detail:d.ref1Name?(d.ref1Name+' / '+(d.ref2Name||'—')):null},
    {label:'Eligibility & loan amount confirmed', done:!!d.loanAmount,           detail:d.loanAmount?'₹'+d.loanAmount.toLocaleString('en-IN'):null},
    {label:'KYC video reviewed & approved',       done:!!kyc.agentApproved,      detail:kyc.approvedAt?'At '+new Date(kyc.approvedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):null},
    {label:'Repayment plan selected',             done:!!plan.type,              detail:plan.type==='MONTHLY'?'Fixed EMI · '+plan.tenure+'mo':plan.type==='SEASONAL'?'Flexible EMI':plan.type==='MICRO'?'Micro · ₹'+plan.dailyAmount+'/day':null},
  ];
  const doneCount=steps.filter(s=>s.done).length;
  const allDone=doneCount===steps.length;
  const loanRef=d.approval?.loanRef||'Pending';
  const disburseD=d.approval?.disburseDate?new Date(d.approval.disburseDate).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'Next working day';

  area.innerHTML = `
    <!-- Progress -->
    <div class="card" style="padding:10px 12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:11px;font-weight:600;color:var(--text-2)">🏁 Disbursal checklist</span>
        <span style="font-size:11px;font-weight:700;color:${allDone?'var(--green)':'var(--amber)'}">${doneCount}/${steps.length}</span>
      </div>
      <div style="height:5px;border-radius:3px;background:var(--border);overflow:hidden">
        <div style="height:100%;border-radius:3px;background:${allDone?'var(--green)':'var(--amber)'};width:${Math.round(doneCount/steps.length*100)}%;transition:width .4s"></div>
      </div>
    </div>

    <!-- Checklist -->
    <div class="card" style="padding:8px 12px">
      ${steps.map(s=>`
        <div class="check-item">
          <div class="check-icon ${s.done?'check-done':'check-pending'}">${s.done?'✓':'○'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;color:${s.done?'var(--text)':'var(--gray)'};font-weight:${s.done?500:400}">${s.label}</div>
            ${s.done&&s.detail?`<div style="font-size:10px;color:var(--text-2);margin-top:1px">${s.detail}</div>`:''}
          </div>
        </div>`).join('')}
    </div>

    <!-- Loan summary -->
    <div class="card">
      <div class="card-title">💸 Disbursement details</div>
      <div class="data-row"><span class="data-key">Vendor</span><span class="data-val">+${vendor.phone||'—'}</span></div>
      <div class="data-row"><span class="data-key">Loan amount</span><span class="data-val" style="color:var(--green);font-weight:700;font-size:15px">₹${(d.loanAmount||MAX_LOAN).toLocaleString('en-IN')}</span></div>
      <div class="data-row"><span class="data-key">Reference no.</span><span class="data-val" style="font-family:monospace;font-size:10px">${loanRef}</span></div>
      <div class="data-row"><span class="data-key">Disbursement</span><span class="data-val">${disburseD}</span></div>
    </div>

    <!-- Disburse button -->
    ${allDone ? `
      <button class="btn btn-green btn-full" id="disburseBtn" style="font-size:14px;padding:15px" onclick="doDisburse()">
        💸 Approve &amp; Disburse
      </button>
    ` : `
      <div class="card card-amber">
        <div style="font-size:11px;color:#92400e">⚠️ ${steps.length-doneCount} step${steps.length-doneCount>1?'s':''} remaining before disbursement.</div>
      </div>
    `}
  `;
}
async function doDisburse() {
  const btn=document.getElementById('disburseBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Processing...';}
  const ok=await agentAction('proceed_plan');
  if(ok){
    addLog('Loan disbursed for +'+vendor.phone);
    const ref=vendor.data?.approval?.loanRef||'SVAN-'+Date.now().toString().slice(-8);
    document.getElementById('scrollArea').innerHTML=`
      <div class="card card-green" style="text-align:center;padding:28px 16px;margin-top:16px">
        <div style="font-size:40px;margin-bottom:10px">🎉</div>
        <div style="font-size:16px;font-weight:700;color:var(--green);margin-bottom:6px">Loan Approved &amp; Disbursed!</div>
        <div style="font-size:12px;color:var(--text-2);line-height:1.7">
          Ref: <strong>${ref}</strong><br/>
          Amount: <strong>₹${(vendor.data?.loanAmount||MAX_LOAN).toLocaleString('en-IN')}</strong><br/>
          Vendor has been notified on WhatsApp.
        </div>
      </div>`;
  }
}

// ══════════════════════════════════════════════════════════════
// INIT — auto-login from URL param

const autoPass = new URLSearchParams(location.search).get('pass');
if (autoPass) {
  document.getElementById('agentPass').value  = autoPass;
  document.getElementById('agentPhone').value = '0000000000';
  agentLogin();
}
</script>
